const initials = n => n.split(" ").map(x=>x[0]).slice(0,2).join("").toUpperCase();
const parseD   = s => new Date(s + "T00:00:00");
const fmtD     = d => d.toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"});
const fmtShort = d => d.toLocaleDateString("es-ES",{day:"2-digit",month:"short"});

const statusColor = s => {
  if(s==="Activo"||s==="Activa") return {bg:"#d1fae5",text:"#065f46"};
  if(s==="Remota")               return {bg:"#dbeafe",text:"#1e40af"};
  if(s==="Baja médica")          return {bg:"#fee2e2",text:"#991b1b"};
  if(s==="Sin asignar")          return {bg:"#fef3c7",text:"#92400e"};
  return {bg:"#f3f4f6",text:"#374151"};
};

const rentColor = (o,c) => {
  if(!o) return {bg:"#1e293b",text:"#64748b",label:"—"};
  const p=c/o*100;
  if(p<=85)  return {bg:"#d1fae5",text:"#065f46",label:"✓ OK"};
  if(p<=100) return {bg:"#fef3c7",text:"#92400e",label:"⚠ Alerta"};
  return {bg:"#fee2e2",text:"#991b1b",label:"✕ Riesgo"};
};

const tipoColor = t => ({COO:"#3b82f6",MOD:"#22c55e",BEP:"#f59e0b",AT:"#a78bfa"}[t]||"#64748b");

const progressColor = p => p>=100?"#ef4444":p>=85?"#f59e0b":"#22c55e";

  const TOTAL_W = MONTHS.length * MONTH_W;

  const yearStart = new Date(`${ganttYear}-01-01T00:00:00`);
  const yearEnd   = new Date(`${ganttYear}-12-31T23:59:59`);
  const totalMs   = yearEnd - yearStart;

  const pctX = (date) => {
    const d = typeof date === "string" ? parseD(date) : date;
    return Math.max(0, Math.min(1, (d - yearStart) / totalMs));
  };

  const todayPct    = pctX(TODAY);
  const todayInYear = TODAY >= yearStart && TODAY <= yearEnd;

  // For each person, collect their project segments (from project dates + assignment)
  const activePeople = useMemo(() => {
    return people.filter(p => {
      if(filterSw !== "Todos" && p.software !== filterSw) return false;
      return true;
    }).sort((a,b) => a.name.localeCompare(b.name));
  }, [people, filterSw]);

  // Get segments for a person: one segment per assignment (using project dates)
  const segmentsFor = (personId) => {
    return assignments
      .filter(a => a.personId === personId)
      .filter(a => filterRol === "Todos" || a.rol === filterRol || (!a.rol && filterRol === "Todos"))
      .map(a => {
        const proj = projects.find(p => p.id === a.projectId);
        if (!proj) return null;
        // Use assignment-specific dates if available, else fall back to project dates
        const iniStr = a.fechaIni || proj.inicio;
        const finStr = a.fechaFin || proj.fin;
        if (!iniStr || !finStr) return null;
        const s = parseD(iniStr);
        const e = parseD(finStr);
        if (s > yearEnd || e < yearStart) return null;
        return { proj, a, startPct: pctX(iniStr), endPct: pctX(finStr), iniStr, finStr };
      })
      .filter(Boolean);
  };

  // Load per person per month = number of concurrent projects
  const loadMatrix = useMemo(() => {
    return activePeople.map(person => ({
      person,
      segs: segmentsFor(person.id),
    })).filter(r => r.segs.length > 0);
  }, [activePeople, assignments, projects, ganttYear, filterRol]);

  // People overload per month (for summary bar chart)
  const loadPerMonth = MONTHS.map((_,mi) => {
    const mStart = new Date(ganttYear, mi, 1);
    const mEnd   = new Date(ganttYear, mi+1, 0);
    return loadMatrix.filter(({segs}) =>
      segs.some(s => parseD(s.proj.inicio) <= mEnd && parseD(s.proj.fin) >= mStart)
    ).length;
  });
  const maxLoad = Math.max(...loadPerMonth, 1);

  // Unique projects in view (for the legend / highlight)
  const visibleProjects = useMemo(() => {
    const ids = new Set(loadMatrix.flatMap(r => r.segs.map(s => s.proj.id)));
    return projects.filter(p => ids.has(p.id));
  }, [loadMatrix, projects]);

  const projColor = (projId) => {
    const idx = visibleProjects.findIndex(p => p.id === projId);
    return GANTT_COLORS[idx % GANTT_COLORS.length];
  };

  const swColor = sw => sw === "Civil 3D" ? "#f59e0b" : sw === "Ambos" ? "#22c55e" : "#3b82f6";

  return (
    <div style={{paddingBottom:40}}>

      {/* Controls */}
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:"#f1f5f9"}}>Calendario de Equipo</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>
            Ocupación por persona · cuándo está en cada proyecto y cuándo termina
          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          {/* Software filter */}
          <div style={{display:"flex",gap:3,background:"#0f172a",borderRadius:8,padding:3}}>
            {["Todos","Revit","Civil 3D","Ambos"].map(sw=>(
              <button key={sw} onClick={()=>setFilterSw(sw)}
                style={{border:"none",borderRadius:6,padding:"5px 11px",fontSize:11,fontWeight:600,cursor:"pointer",
                  background:filterSw===sw?(sw==="Civil 3D"?"#f59e0b":sw==="Ambos"?"#22c55e":"#3b82f6"):"transparent",
                  color:filterSw===sw?"#fff":"#64748b"}}>
                {sw}
              </button>
            ))}
          </div>
          {/* Rol filter */}
          <div style={{display:"flex",gap:3,background:"#0f172a",borderRadius:8,padding:3}}>
            {["Todos","Modelado","Coordinación"].map(r=>(
              <button key={r} onClick={()=>setFilterRol(r)}
                style={{border:"none",borderRadius:6,padding:"5px 11px",fontSize:11,fontWeight:600,cursor:"pointer",
                  background:filterRol===r?(r==="Coordinación"?"#a78bfa":"#3b82f6"):"transparent",
                  color:filterRol===r?"#fff":"#64748b"}}>
                {r==="Modelado"?"🟦 MOD":r==="Coordinación"?"🟣 COO":"Todos"}
              </button>
            ))}
          </div>
          {/* Year nav */}
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <button onClick={()=>setGanttYear(y=>y-1)}
              style={{border:"none",background:"#1e293b",color:"#e2e8f0",borderRadius:8,
                padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>‹</button>
            <span style={{fontSize:14,fontWeight:700,color:"#f1f5f9",minWidth:40,textAlign:"center"}}>{ganttYear}</span>
            <button onClick={()=>setGanttYear(y=>y+1)}
              style={{border:"none",background:"#1e293b",color:"#e2e8f0",borderRadius:8,
                padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>›</button>
          </div>
        </div>
      </div>

      {/* Project legend for highlight */}
      {visibleProjects.length > 0 && (
        <div style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,
          padding:"12px 16px",marginBottom:14,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
          <span style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",
            letterSpacing:"0.5px",marginRight:4}}>Destacar proyecto:</span>
          <button onClick={()=>setHighlightProj(null)}
            style={{border:"none",borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700,cursor:"pointer",
              background:highlightProj===null?"#3b82f6":"#0f172a",color:highlightProj===null?"#fff":"#64748b"}}>
            Todos
          </button>
          {visibleProjects.map(p=>{
            const c = projColor(p.id);
            const sel = highlightProj === p.id;
            return (
              <button key={p.id} onClick={()=>setHighlightProj(sel?null:p.id)}
                style={{border:`1.5px solid ${c}`,borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:700,
                  cursor:"pointer",background:sel?`${c}30`:"transparent",color:sel?c:"#64748b",
                  transition:"all .15s"}}>
                {p.name}
              </button>
            );
          })}
        </div>
      )}

      {/* Load summary chart — people active per month */}
      <div style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,padding:"14px 18px",marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10}}>
          Personas activas por mes · máximo {maxLoad}
        </div>
        <div style={{display:"flex",gap:3,alignItems:"flex-end",height:52}}>
          {loadPerMonth.map((n,mi)=>{
            const h = maxLoad > 0 ? Math.round((n/maxLoad)*44)+8 : 8;
            const color = n>=20?"#ef4444":n>=12?"#f59e0b":"#3b82f6";
            const isNow = TODAY.getFullYear()===ganttYear && TODAY.getMonth()===mi;
            return (
              <div key={mi} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{fontSize:9,fontWeight:700,color}}>{n>0?n:""}</div>
                <div style={{width:"100%",height:h,background:color,borderRadius:"3px 3px 0 0",
                  opacity:isNow?1:0.6,border:isNow?`2px solid ${color}`:"2px solid transparent"}}/>
                <div style={{fontSize:9,color:isNow?"#f1f5f9":"#475569",fontWeight:isNow?700:400}}>{MONTHS[mi]}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Main Gantt grid */}
      <div style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,overflow:"hidden"}}>

        {/* Header */}
        <div style={{display:"flex",borderBottom:"1px solid #0f172a",position:"sticky",top:0,zIndex:10,background:"#162032"}}>
          <div style={{width:LABEL_W,minWidth:LABEL_W,padding:"10px 16px",
            fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",
            borderRight:"1px solid #0f172a",flexShrink:0}}>
            Persona
          </div>
          <div style={{flex:1,overflowX:"auto"}} ref={scrollRef}>
            <div style={{display:"flex",minWidth:TOTAL_W}}>
              {MONTHS.map(m=>(
                <div key={m} style={{width:MONTH_W,minWidth:MONTH_W,textAlign:"center",
                  padding:"10px 4px",fontSize:11,fontWeight:700,color:"#64748b",
                  textTransform:"uppercase",letterSpacing:"0.5px",borderRight:"1px solid #0f172a"}}>
                  {m} {ganttYear}
                </div>
              ))}
            </div>
          </div>
        </div>

        {loadMatrix.length === 0 && (
          <div style={{padding:36,textAlign:"center",color:"#475569",fontSize:13}}>
            Sin asignaciones visibles en {ganttYear} con los filtros seleccionados
          </div>
        )}

        {loadMatrix.map(({person, segs}, rowIdx) => {
          const sc     = statusColor(person.status);
          const swC    = swColor(person.software);
          const isEven = rowIdx % 2 === 0;

          // Stack segments into lanes to avoid visual overlaps
          const lanes = [];
          segs.forEach(seg => {
            let placed = false;
            for(const lane of lanes) {
              const last = lane[lane.length-1];
              if(seg.startPct >= last.endPct + 0.005) {
                lane.push(seg); placed = true; break;
              }
            }
            if(!placed) lanes.push([seg]);
          });
          const nLanes = Math.max(lanes.length, 1);
          const rowH   = Math.max(ROW_H, nLanes * 26 + 12);

          return (
            <div key={person.id}
              style={{display:"flex",borderBottom:"1px solid #0f172a",
                background:isEven?"#1e293b":"#162032",minHeight:rowH}}>

              {/* Person label */}
              <div style={{width:LABEL_W,minWidth:LABEL_W,padding:"8px 12px",
                display:"flex",alignItems:"flex-start",gap:8,borderRight:"1px solid #0f172a",flexShrink:0}}>
                <div style={{marginTop:2}}>
                  <Avatar name={person.name} status={person.status} size={28}/>
                </div>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0",
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {person.name}
                  </div>
                  <div style={{fontSize:9,color:"#64748b",marginTop:1}}>{person.perfil}</div>
                  <div style={{display:"flex",gap:4,marginTop:3,flexWrap:"wrap"}}>
                    <span style={{background:`${swC}20`,color:swC,fontSize:8,fontWeight:700,
                      padding:"1px 5px",borderRadius:99}}>
                      {person.software==="Civil 3D"?"C3D":person.software==="Ambos"?"AMP":"RVT"}
                    </span>
                    <span style={{fontSize:8,color:"#475569"}}>{segs.length} proy.</span>
                  </div>
                </div>
              </div>

              {/* Gantt track */}
              <div style={{flex:1,position:"relative",minWidth:TOTAL_W,height:rowH}}>

                {/* Month grid lines */}
                {MONTHS.map((_,mi)=>(
                  <div key={mi} style={{position:"absolute",left:`${(mi/12)*100}%`,top:0,bottom:0,
                    width:1,background:"#0f172a",opacity:0.5}}/>
                ))}

                {/* Today line */}
                {todayInYear && (
                  <div style={{position:"absolute",left:`${todayPct*100}%`,top:0,bottom:0,
                    width:2,background:"#f97316",zIndex:5,opacity:0.9}}/>
                )}

                {/* Absence bars */}
                {(absences||[]).filter(ab=>ab.personId===person.id).map((ab,ai)=>{
                  const abS = pctX(ab.inicio);
                  const abE = pctX(ab.fin);
                  const abW = Math.max(abE-abS, 0.005);
                  const abColor = ab.tipo==="Vacaciones"?"#f59e0b":ab.tipo==="Baja"?"#ef4444":"#a78bfa";
                  const hasConflict = (absences||[]).filter(ab2=>ab2.personId===person.id).some(ab2=>
                    assignments.filter(a2=>a2.personId===person.id).some(a2=>{
                      const proj2=projects.find(p=>p.id===a2.projectId);
                      if(!proj2||!proj2.inicio||!proj2.fin) return false;
                      return parseD(proj2.inicio)<=parseD(ab.fin) && parseD(proj2.fin)>=parseD(ab.inicio);
                    })
                  );
                  return (
                    <div key={"ab"+ai}
                      title={ab.tipo+" · "+ab.inicio+" → "+ab.fin+(hasConflict?" ⚠ Conflicto con asignación!":"")}
                      style={{
                        position:"absolute",
                        left:abS*100+"%",
                        width:abW*100+"%",
                        top:0,bottom:0,
                        background:abColor+"22",
                        borderTop:"2px solid "+abColor+"90",
                        borderBottom:"2px solid "+abColor+"90",
                        zIndex:hasConflict?8:1,
                        pointerEvents:"none",
                      }}>
                      {abW>0.04&&(
                        <div style={{position:"absolute",top:2,left:4,fontSize:8,fontWeight:700,color:abColor,whiteSpace:"nowrap",overflow:"hidden"}}>
                          {hasConflict?"⚠ ":""}{ab.tipo}
                        </div>
                      )}
                      {hasConflict&&(
                        <div style={{position:"absolute",inset:0,border:"2px solid #ef4444",pointerEvents:"none",zIndex:9}}/>
                      )}
                    </div>
                  );
                })}

                {/* Render lanes */}
                {lanes.map((lane, laneIdx) =>
                  lane.map((seg) => {
                    const { proj, a } = seg;
                    const color  = projColor(proj.id);
                    const barW   = Math.max(seg.endPct - seg.startPct, 0.008);
                    const isHL   = highlightProj === null || highlightProj === proj.id;
                    const rolColor = a.rol === "Coordinación" ? "#a78bfa" : a.rol === "Modelado" ? "#3b82f6" : color;
                    const barTop = 6 + laneIdx * 26;
                    const entPct = proj.entrega ? pctX(proj.entrega) : null;

                    return (
                      <React.Fragment key={`${proj.id}|${a.rol||"x"}|${laneIdx}`}>
                        {/* Project bar */}
                        <div
                          className="gantt-bar"
                          onMouseEnter={e=>setTooltip({person, proj, a, x:e.clientX, y:e.clientY, iniStr:seg.iniStr, finStr:seg.finStr})}
                          onMouseLeave={()=>setTooltip(null)}
                          style={{
                            position:"absolute",
                            left:`${seg.startPct*100}%`,
                            width:`${barW*100}%`,
                            top:barTop,
                            height:20,
                            borderRadius:4,
                            background: isHL ? `${color}35` : "#1e293b",
                            border: isHL ? `1.5px solid ${color}80` : "1.5px solid #334155",
                            overflow:"hidden",
                            opacity: isHL ? 1 : 0.25,
                            zIndex:2,
                            cursor:"pointer",
                            transition:"opacity .2s",
                          }}>
                          {/* Rol color strip on left edge */}
                          {isHL && a.rol && (
                            <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,
                              background:rolColor,borderRadius:"3px 0 0 3px"}}/>
                          )}
                          {/* Label inside bar if wide enough */}
                          {isHL && barW > 0.1 && (
                            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
                              paddingLeft: a.rol ? 7 : 5,fontSize:8,fontWeight:700,color:"#f1f5f9",
                              whiteSpace:"nowrap",overflow:"hidden",zIndex:2}}>
                              {proj.name}
                            </div>
                          )}
                        </div>

                        {/* Entrega diamond */}
                        {entPct !== null && entPct >= 0 && entPct <= 1 && isHL && (
                          <div
                            onMouseEnter={e=>setTooltip({person, proj, a, x:e.clientX, y:e.clientY, isEntrega:true})}
                            onMouseLeave={()=>setTooltip(null)}
                            style={{
                              position:"absolute",
                              left:`${entPct*100}%`,
                              top: barTop + 3,
                              transform:"translate(-50%,0) rotate(45deg)",
                              width:12,height:12,
                              background:color,
                              border:"2px solid #0f172a",
                              zIndex:6,cursor:"pointer",
                            }}/>
                        )}

                        {/* End marker: vertical tick at fin date */}
                        {isHL && (
                          <div style={{
                            position:"absolute",
                            left:`${seg.endPct*100}%`,
                            top: barTop,
                            height:20,
                            width:2,
                            background:`${color}90`,
                            zIndex:3,
                          }}/>
                        )}
                      </React.Fragment>
                    );
                  })
                )}
              </div>
            </div>
          );
        })}

        {/* Legend */}
        <div style={{padding:"12px 16px",display:"flex",gap:16,alignItems:"center",
          borderTop:"1px solid #0f172a",background:"#0f172a",flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:3,height:14,background:"#3b82f6",borderRadius:2}}/>
            <span>Franja izq. = rol (🟦 MOD / 🟣 COO)</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:10,height:10,background:"#a78bfa",transform:"rotate(45deg)",flexShrink:0}}/>
            <span>◆ Fecha entrega del proyecto</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:2,height:14,background:"#64748b",borderRadius:1}}/>
            <span>| Fin del proyecto</span>
          </div>
          {todayInYear && (
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
              <div style={{width:2,height:14,background:"#f97316"}}/>
              <span>Hoy ({fmtShort(TODAY)})</span>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:20,height:10,background:"#f59e0b22",borderTop:"2px solid #f59e0b90",borderBottom:"2px solid #f59e0b90"}}/>
            <span>Vacaciones / Ausencia</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#ef4444"}}>
            <div style={{width:20,height:10,border:"2px solid #ef4444"}}/>
            <span>⚠ Conflicto con asignación</span>
          </div>
        </div>
      </div>

      {/* Tooltip */}
      {tooltip && (
        <div style={{
          position:"fixed",left:tooltip.x+14,top:tooltip.y-10,
          background:"#1e293b",border:"1px solid #334155",
          borderRadius:10,padding:"12px 16px",zIndex:200,
          boxShadow:"0 8px 32px rgba(0,0,0,.5)",minWidth:240,pointerEvents:"none"
        }}>
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:2}}>
            {tooltip.proj.name}
          </div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>
            {tooltip.proj.client} · {tooltip.proj.bimId}
          </div>
          {tooltip.isEntrega ? (
            <div style={{fontSize:11,color:"#f59e0b",fontWeight:600}}>🔔 Entrega: {fmtD(parseD(tooltip.proj.entrega))}</div>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"4px 12px",fontSize:11}}>
              <span style={{color:"#64748b"}}>Persona</span>
              <span style={{color:"#e2e8f0",fontWeight:600}}>{tooltip.person.name}</span>
              {tooltip.a.rol&&<><span style={{color:"#64748b"}}>Rol</span>
              <span style={{color:tooltip.a.rol==="Coordinación"?"#a78bfa":"#3b82f6",fontWeight:700}}>
                {tooltip.a.rol==="Coordinación"?"🟣 Coordinación":"🟦 Modelado"}
              </span></>}
              {tooltip.a.software&&<><span style={{color:"#64748b"}}>Software</span>
              <span style={{color:"#e2e8f0"}}>{tooltip.a.software}</span></>}
              <span style={{color:"#64748b"}}>Horas asig.</span>
              <span style={{color:"#e2e8f0"}}>{tooltip.a.horas}h</span>
              {tooltip.a.horasReales!=null&&<><span style={{color:"#64748b"}}>Horas reales</span>
              <span style={{color:"#3b82f6",fontWeight:700}}>{tooltip.a.horasReales}h</span></>}
              <span style={{color:"#64748b"}}>Inicio asig.</span>
              <span style={{color:"#e2e8f0"}}>{tooltip.iniStr?fmtShort(parseD(tooltip.iniStr)):fmtShort(parseD(tooltip.proj.inicio))}</span>
              <span style={{color:"#64748b"}}>Fin asig.</span>
              <span style={{color:"#e2e8f0"}}>{tooltip.finStr?fmtShort(parseD(tooltip.finStr)):fmtShort(parseD(tooltip.proj.fin))}</span>
              {tooltip.a.pct&&<><span style={{color:"#64748b"}}>Dedicación</span><span style={{color:"#22c55e",fontWeight:700}}>{tooltip.a.pct}%</span></>}
              {tooltip.proj.entrega&&<><span style={{color:"#64748b"}}>Entrega</span>
              <span style={{color:"#f59e0b",fontWeight:700}}>{fmtShort(parseD(tooltip.proj.entrega))}</span></>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── GANTT CALENDAR VIEW ──────────────────────────────────────────────────────

function GanttView({ projects, assignments }) {

  const [ganttYear, setGanttYear] = useState(2026);
  const [tooltip,   setTooltip]   = useState(null); // {proj, x, y}
  const [filterTipo, setFilterTipo] = useState("Todos");
  const scrollRef = useRef(null);

  const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  const ROW_H  = 38;
  const LABEL_W = 200;
  const MONTH_W = 90;
  const TOTAL_W = MONTHS.length * MONTH_W;

  // year range: show selected year + the previous one for multi-year bars
  const yearStart = new Date(`${ganttYear}-01-01T00:00:00`);
  const yearEnd   = new Date(`${ganttYear}-12-31T23:59:59`);
  const totalMs   = yearEnd - yearStart;

  const pctX = (date) => {
    const d = typeof date === "string" ? parseD(date) : date;
    return Math.max(0, Math.min(1, (d - yearStart) / totalMs));
  };

  // Sort projects by start date
  const tipos = ["Todos","COO","MOD","BEP","AT"];
  const sorted = [...projects]
    .filter(p => filterTipo === "Todos" || p.tipo === filterTipo)
    .filter(p => {
      // show if overlaps with selected year
      const s = parseD(p.inicio), e = parseD(p.fin);
      return s <= yearEnd && e >= yearStart;
    })
    .sort((a,b) => parseD(a.inicio) - parseD(b.inicio));

  // Simultaneous projects per month (for the load chart)
  const loadPerMonth = MONTHS.map((_,mi) => {
    const mStart = new Date(ganttYear, mi, 1);
    const mEnd   = new Date(ganttYear, mi+1, 0);
    return sorted.filter(p => {
      const s = parseD(p.inicio), e = parseD(p.fin);
      return s <= mEnd && e >= mStart;
    }).length;
  });

  const maxLoad = Math.max(...loadPerMonth, 1);

  // Today line position
  const todayPct = pctX(TODAY);
  const todayInYear = TODAY >= yearStart && TODAY <= yearEnd;

  const handleBarHover = (e, proj) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setTooltip({ proj, x: e.clientX, y: e.clientY });
  };

  return (
    <div style={{paddingBottom:40}}>

      {/* Controls */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:"#f1f5f9"}}>Calendario de Proyectos</div>
          <div style={{fontSize:12,color:"#64748b",marginTop:2}}>
            Vista Gantt · fechas de inicio, finalización y entrega · carga simultánea por mes
          </div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          {/* Tipo filter */}
          <div style={{display:"flex",gap:4,background:"#0f172a",borderRadius:8,padding:3}}>
            {tipos.map(t=>(
              <button key={t} onClick={()=>setFilterTipo(t)}
                style={{border:"none",borderRadius:6,padding:"5px 12px",fontSize:11,fontWeight:600,cursor:"pointer",
                  background:filterTipo===t?"#3b82f6":"transparent",color:filterTipo===t?"#fff":"#64748b"}}>
                {t}
              </button>
            ))}
          </div>
          {/* Year nav */}
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <button onClick={()=>setGanttYear(y=>y-1)}
              style={{border:"none",background:"#1e293b",color:"#e2e8f0",borderRadius:8,
                padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>‹</button>
            <span style={{fontSize:14,fontWeight:700,color:"#f1f5f9",minWidth:40,textAlign:"center"}}>{ganttYear}</span>
            <button onClick={()=>setGanttYear(y=>y+1)}
              style={{border:"none",background:"#1e293b",color:"#e2e8f0",borderRadius:8,
                padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600}}>›</button>
          </div>
        </div>
      </div>

      {/* Load chart — simultaneous projects */}
      <div style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,padding:"16px 20px",marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:12}}>
          Proyectos simultáneos por mes · máximo {maxLoad}
        </div>
        <div style={{display:"flex",gap:3,alignItems:"flex-end",height:60}}>
          {loadPerMonth.map((n,mi)=>{
            const h = maxLoad > 0 ? Math.round((n/maxLoad)*52)+8 : 8;
            const isHigh = n >= 10;
            const isMed  = n >= 6 && n < 10;
            const color  = isHigh?"#ef4444":isMed?"#f59e0b":"#3b82f6";
            const isCurrentMonth = TODAY.getFullYear()===ganttYear && TODAY.getMonth()===mi;
            return (
              <div key={mi} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:10,fontWeight:700,color}}>
                  {n>0?n:""}
                </div>
                <div style={{width:"100%",height:h,background:color,
                  borderRadius:"4px 4px 0 0",opacity:isCurrentMonth?1:0.65,
                  border:isCurrentMonth?`2px solid ${color}`:"2px solid transparent",
                  transition:"height .3s"}}/>
                <div style={{fontSize:9,color:isCurrentMonth?"#f1f5f9":"#475569",fontWeight:isCurrentMonth?700:400}}>
                  {MONTHS[mi]}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Gantt */}
      <div style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,overflow:"hidden"}}>

        {/* Header row */}
        <div style={{display:"flex",borderBottom:"1px solid #0f172a",position:"sticky",top:0,zIndex:10,background:"#162032"}}>
          <div style={{width:LABEL_W,minWidth:LABEL_W,padding:"10px 16px",
            fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",
            borderRight:"1px solid #0f172a",flexShrink:0}}>
            Proyecto
          </div>
          <div style={{flex:1,overflowX:"auto"}} ref={scrollRef}>
            <div style={{display:"flex",minWidth:TOTAL_W}}>
              {MONTHS.map(m=>(
                <div key={m} style={{width:MONTH_W,minWidth:MONTH_W,textAlign:"center",
                  padding:"10px 4px",fontSize:11,fontWeight:700,color:"#64748b",
                  textTransform:"uppercase",letterSpacing:"0.5px",
                  borderRight:"1px solid #0f172a"}}>
                  {m} {ganttYear}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Rows */}
        {sorted.length === 0 && (
          <div style={{padding:32,textAlign:"center",color:"#475569",fontSize:13}}>
            No hay proyectos en {ganttYear} con el filtro seleccionado
          </div>
        )}

        {sorted.map((proj, i) => {
          const startPct  = pctX(proj.inicio);
          const endPct    = pctX(proj.fin);
          const entPct    = proj.entrega ? pctX(proj.entrega) : null;
          const barW      = Math.max(endPct - startPct, 0.01);
          const color     = GANTT_COLORS[i % GANTT_COLORS.length];
          const rent      = rentColor(proj.horasOferta, proj.horasConsumidas);
          const nPersonas = assignments.filter(a=>a.projectId===proj.id).length;
          const isEven    = i % 2 === 0;

          // progress fill inside bar
          const consumed  = proj.horasOferta > 0 ? proj.horasConsumidas / proj.horasOferta : 0;
          const progW     = Math.min(consumed, 1) * barW;

          return (
            <div key={proj.id}
              style={{display:"flex",borderBottom:"1px solid #0f172a",
                background:isEven?"#1e293b":"#162032",minHeight:ROW_H}}>

              {/* Label */}
              <div style={{width:LABEL_W,minWidth:LABEL_W,padding:"0 12px",
                display:"flex",alignItems:"center",gap:8,borderRight:"1px solid #0f172a",flexShrink:0}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#e2e8f0",
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:160}}>
                    {proj.name}
                  </div>
                  <div style={{fontSize:9,color:"#475569"}}>{proj.client} · {nPersonas}👤</div>
                </div>
              </div>

              {/* Gantt track */}
              <div style={{flex:1,position:"relative",minWidth:TOTAL_W}}>

                {/* month grid lines */}
                {MONTHS.map((_,mi)=>(
                  <div key={mi} style={{position:"absolute",left:`${(mi/12)*100}%`,top:0,bottom:0,
                    width:1,background:"#0f172a",opacity:0.6}}/>
                ))}

                {/* today line */}
                {todayInYear && (
                  <div style={{position:"absolute",left:`${todayPct*100}%`,top:0,bottom:0,
                    width:2,background:"#f97316",zIndex:5,opacity:0.9}}/>
                )}

                {/* bar background (full duration) */}
                <div
                  className="gantt-bar"
                  onMouseEnter={e=>handleBarHover(e,proj)}
                  onMouseLeave={()=>setTooltip(null)}
                  style={{
                    position:"absolute",
                    left:`${startPct*100}%`,
                    width:`${barW*100}%`,
                    top:"50%",transform:"translateY(-50%)",
                    height:22,borderRadius:4,
                    background:`${color}30`,
                    border:`1.5px solid ${color}70`,
                    overflow:"hidden",
                  }}>
                  {/* progress fill */}
                  <div style={{
                    position:"absolute",left:0,top:0,bottom:0,
                    width:`${progW/barW*100}%`,
                    background:`${color}80`,
                    borderRadius:"3px 0 0 3px",
                  }}/>
                  {/* label inside bar if wide enough */}
                  {barW > 0.12 && (
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",
                      paddingLeft:6,fontSize:9,fontWeight:700,color:"#f1f5f9",
                      whiteSpace:"nowrap",overflow:"hidden",zIndex:2}}>
                      {proj.name}
                    </div>
                  )}
                </div>

                {/* entrega diamond */}
                {entPct !== null && entPct >= 0 && entPct <= 1 && (
                  <div
                    onMouseEnter={e=>setTooltip({proj,x:e.clientX,y:e.clientY,isEntrega:true})}
                    onMouseLeave={()=>setTooltip(null)}
                    style={{
                      position:"absolute",
                      left:`${entPct*100}%`,
                      top:"50%",transform:"translate(-50%,-50%) rotate(45deg)",
                      width:10,height:10,
                      background:color,
                      border:"2px solid #0f172a",
                      zIndex:6,cursor:"pointer",
                    }}/>
                )}

                {/* hitos diamonds */}
                {(proj.hitos||[]).filter(h=>h.fecha).map((hito,hi)=>{
                  const hPct = pctX(hito.fecha);
                  if(hPct<0||hPct>1) return null;
                  const hColor = hito.ok?"#22c55e":"#f59e0b";
                  return (
                    <div key={hi}
                      onMouseEnter={e=>setTooltip({proj,x:e.clientX,y:e.clientY,isHito:true,hito})}
                      onMouseLeave={()=>setTooltip(null)}
                      style={{
                        position:"absolute",
                        left:hPct*100+"%",
                        top:"50%",transform:"translate(-50%,-50%) rotate(45deg)",
                        width:8,height:8,
                        background:hColor,
                        border:"2px solid #0f172a",
                        zIndex:7,cursor:"pointer",
                        boxShadow:"0 0 4px "+hColor+"80",
                      }}/>
                  );
                })}

              </div>
            </div>
          );
        })}

        {/* Legend */}
        <div style={{padding:"12px 16px",display:"flex",gap:20,alignItems:"center",
          borderTop:"1px solid #0f172a",background:"#0f172a",flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:28,height:8,borderRadius:2,background:"#3b82f630",border:"1.5px solid #3b82f670"}}/>
            <div style={{width:14,height:8,borderRadius:"2px 0 0 2px",background:"#3b82f680",marginLeft:-14}}/>
            <span>Duración (relleno = % consumido)</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:10,height:10,background:"#a78bfa",transform:"rotate(45deg)",flexShrink:0}}/>
            <span>Fecha de entrega</span>
          </div>
          {todayInYear && (
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
              <div style={{width:2,height:16,background:"#f97316",flexShrink:0}}/>
              <span>Hoy ({fmtShort(TODAY)})</span>
            </div>
          )}
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:8,height:8,background:"#f59e0b",transform:"rotate(45deg)",flexShrink:0}}/>
            <span>◆ Hito pendiente</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:"#64748b"}}>
            <div style={{width:8,height:8,background:"#22c55e",transform:"rotate(45deg)",flexShrink:0}}/>
            <span>◆ Hito completado</span>
          </div>
        </div>
      </div>

      {/* Tooltip */}
      {tooltip && (
        <div style={{
          position:"fixed",left:tooltip.x+14,top:tooltip.y-10,
          background:"#1e293b",border:"1px solid #334155",
          borderRadius:10,padding:"12px 16px",zIndex:200,
          boxShadow:"0 8px 32px rgba(0,0,0,.5)",minWidth:220,pointerEvents:"none"
        }}>
          <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",marginBottom:6}}>
            {tooltip.proj.name}
          </div>
          {tooltip.isHito ? (
            <div>
              <div style={{fontSize:12,fontWeight:700,color:tooltip.hito.ok?"#22c55e":"#f59e0b",marginBottom:4}}>
                {tooltip.hito.ok?"✅":"🔶"} {tooltip.hito.n}
              </div>
              <div style={{fontSize:11,color:"#94a3b8"}}>{fmtD(parseD(tooltip.hito.fecha))}</div>
              <div style={{fontSize:10,color:"#64748b",marginTop:4}}>{tooltip.hito.ok?"Completado":"Pendiente"}</div>
            </div>
          ) : tooltip.isEntrega ? (
            <div style={{fontSize:11,color:"#f59e0b",fontWeight:600}}>
              🔔 Entrega: {fmtD(parseD(tooltip.proj.entrega))}
            </div>
          ) : (
            <>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>
                {tooltip.proj.client} · {tooltip.proj.bimId}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"4px 12px",fontSize:11}}>
                <span style={{color:"#64748b"}}>Inicio</span>
                <span style={{color:"#e2e8f0"}}>{fmtD(parseD(tooltip.proj.inicio))}</span>
                <span style={{color:"#64748b"}}>Fin est.</span>
                <span style={{color:"#e2e8f0"}}>{fmtD(parseD(tooltip.proj.fin))}</span>
                {tooltip.proj.entrega&&<><span style={{color:"#64748b"}}>Entrega</span>
                <span style={{color:"#f59e0b",fontWeight:700}}>{fmtD(parseD(tooltip.proj.entrega))}</span></>}
                <span style={{color:"#64748b"}}>Horas</span>
                <span style={{color:"#e2e8f0"}}>{tooltip.proj.horasConsumidas}/{tooltip.proj.horasOferta}h</span>
                <span style={{color:"#64748b"}}>Avance</span>
                <span style={{color:progressColor(Math.round(tooltip.proj.horasConsumidas/tooltip.proj.horasOferta*100)),fontWeight:700}}>
                  {tooltip.proj.horasOferta>0?Math.round(tooltip.proj.horasConsumidas/tooltip.proj.horasOferta*100):0}%
                </span>
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── REPORT VIEW ──────────────────────────────────────────────────────────────

function ReportView({ projects, people, assignments }) {

  const [reportMode, setReportMode] = useState("proyecto"); // "proyecto" | "persona" | "fecha"
  const [filterProj, setFilterProj] = useState("__todos__");
  const [filterPers, setFilterPers] = useState("__todos__");
  const [fechaDesde, setFechaDesde] = useState("");
  const [fechaHasta, setFechaHasta] = useState("");

  const [scope, setScope] = useState(() => {
    try { const s = localStorage.getItem(SCOPE_KEY); if(s) return JSON.parse(s); } catch(e){}
    return SCOPE_DEFAULT;
  });

  const [editingScope, setEditingScope] = useState(null); // projectId
  const [newHito,      setNewHito]      = useState("");
  const [newDisc,      setNewDisc]      = useState("");

  const saveScope = (s) => {
    setScope(s);
    try { localStorage.setItem(SCOPE_KEY, JSON.stringify(s)); } catch(e){}
  };

  const getScope = (id) => scope[id] || { pctManual:0, hitos:[], disciplinas:[] };

  // Compute composite scope advance: 40% manual + 35% hitos + 25% disciplinas
  const scopeAvance = (id) => {
    const s = getScope(id);
    const pM  = s.pctManual || 0;
    const pHi = s.hitos.length > 0 ? Math.round(s.hitos.filter(h=>h.ok).length / s.hitos.length * 100) : 0;
    const pDi = s.disciplinas.length > 0 ? Math.round(s.disciplinas.filter(d=>d.ok).length / s.disciplinas.length * 100) : 0;
    return Math.round(pM * 0.40 + pHi * 0.35 + pDi * 0.25);
  };

  // Hours advance
  const horasAvance = (p) => p.horasOferta > 0 ? Math.round(p.horasConsumidas / p.horasOferta * 100) : 0;

  // RAG status: based on scope vs hours divergence + consumption
  const rag = (proj) => {
    const hPct = horasAvance(proj);
    const sPct = scopeAvance(proj.id);
    const diff = hPct - sPct; // positive = consuming more hours than scope progress
    if (hPct > 100 || diff > 25) return "R";
    if (hPct > 85  || diff > 12) return "A";
    return "G";
  };

  const ragColor  = r => ({R:"#ef4444", A:"#f59e0b", G:"#22c55e"}[r]);
  const ragLabel  = r => ({R:"Riesgo", A:"Alerta", G:"OK"}[r]);
  const ragBg     = r => ({R:"#fee2e2", A:"#fef3c7", G:"#d1fae5"}[r]);
  const ragText   = r => ({R:"#991b1b", A:"#92400e", G:"#065f46"}[r]);

  const activeProjs  = projects.filter(p => p.status !== "Cerrado");
  const enRiesgo     = activeProjs.filter(p => rag(p) === "R");
  const enAlerta     = activeProjs.filter(p => rag(p) === "A");
  const totalAsig    = assignments.reduce((s,a) => s + a.horas, 0);
  const activos      = people.filter(p => ["Activo","Activa","Remota"].includes(p.status));

  // People load
  const loadByPerson = useMemo(() => {
    const m = {};
    for(const a of assignments) m[a.personId] = (m[a.personId]||0) + a.horas;
    return m;
  }, [assignments]);

  const overloaded = activos.filter(p => (loadByPerson[p.id]||0) / MAX_H > 0.9);

  const printReport = () => window.print();

  const S2 = {
    section: { marginBottom:28 },
    sectTitle: { fontSize:11, fontWeight:700, color:"#64748b", textTransform:"uppercase",
      letterSpacing:"0.6px", marginBottom:14, paddingBottom:8, borderBottom:"1px solid #1e3a5f" },
    card: { background:"#1e293b", border:"1px solid #1e3a5f", borderRadius:12, padding:"16px 20px" },
    kpi:  { background:"#1e293b", border:"1px solid #1e3a5f", borderRadius:12, padding:"14px 16px" },
    thr:  { background:"#0f172a", padding:"8px 12px", fontSize:10, fontWeight:700,
      color:"#475569", textTransform:"uppercase", letterSpacing:"0.4px", whiteSpace:"nowrap" },
    tdc:  { padding:"10px 12px", fontSize:12, borderBottom:"1px solid #0f172a", verticalAlign:"middle" },
    inp:  { background:"#0f172a", border:"1px solid #334155", borderRadius:6,
      padding:"6px 10px", color:"#e2e8f0", fontSize:12, outline:"none" },
  };

  const editingProj = editingScope ? projects.find(p=>p.id===editingScope) : null;
  const editS       = editingScope ? getScope(editingScope) : null;

  // ── REPORT BY PROJECT ──────────────────────────────────────────────────────
  const ReportByProject = () => {
    const projs = filterProj === "__todos__"
      ? activeProjs
      : activeProjs.filter(p => p.id === filterProj);

    return (
      <div>
        {/* Filter */}
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20,flexWrap:"wrap"}} className="no-print">
          <label style={{fontSize:11,color:"#64748b",fontWeight:600}}>Proyecto:</label>
          <select value={filterProj} onChange={e=>setFilterProj(e.target.value)} style={{...S2.inp,minWidth:220}}>
            <option value="__todos__">— Todos los proyectos —</option>
            {activeProjs.map(p=><option key={p.id} value={p.id}>{p.name} ({p.client})</option>)}
          </select>
        </div>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:28}}>
          {[
            {label:"Proyectos",       value:projs.length,                                   sub:"en este informe",       c:"#3b82f6"},
            {label:"En riesgo 🔴",    value:projs.filter(p=>rag(p)==="R").length,            sub:"superan umbral RAG",    c:"#ef4444"},
            {label:"En alerta 🟡",    value:projs.filter(p=>rag(p)==="A").length,            sub:"requieren atención",    c:"#f59e0b"},
            {label:"Horas totales",   value:projs.reduce((s,p)=>s+p.horasConsumidas,0)+"h", sub:`de ${projs.reduce((s,p)=>s+p.horasOferta,0)}h ofertadas`, c:"#22c55e"},
          ].map(({label,value,sub,c})=>(
            <div key={label} style={S2.kpi}>
              <div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>{label}</div>
              <div style={{fontSize:24,fontWeight:800,color:"#f1f5f9"}}>{value}</div>
              <div style={{fontSize:11,color:c,marginTop:4}}>{sub}</div>
            </div>
          ))}
        </div>

        {/* Proyectos en riesgo */}
        {projs.filter(p=>rag(p)==="R").length > 0 && (
          <div style={S2.section}>
            <div style={S2.sectTitle}>⚠️ Proyectos en riesgo — acción inmediata</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {projs.filter(p=>rag(p)==="R").map(proj => {
                const hPct = horasAvance(proj); const sPct = scopeAvance(proj.id);
                return (
                  <div key={proj.id} style={{...S2.card,borderLeft:"4px solid #ef4444",display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                    <div style={{flex:1,minWidth:160}}>
                      <div style={{fontSize:14,fontWeight:700,color:"#f1f5f9"}}>{proj.name}</div>
                      <div style={{fontSize:11,color:"#64748b"}}>{proj.client} · {proj.bimId}</div>
                    </div>
                    {[["Avance horas",hPct+"%","#ef4444"],["Avance alcance",sPct+"%","#f59e0b"],
                      ["Desviación",(hPct-sPct>0?"+":"")+(hPct-sPct)+"pts","#ef4444"],
                      ...(proj.entrega?[["Entrega",fmtShort(parseD(proj.entrega)),"#f97316"]]:[])
                    ].map(([l,v,c])=>(
                      <div key={l} style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase"}}>{l}</div>
                        <div style={{fontSize:18,fontWeight:800,color:c}}>{v}</div>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Tabla principal */}
        <div style={S2.section}>
          <div style={S2.sectTitle}>Estado de proyectos</div>
          <div style={{...S2.card,padding:0,overflow:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
              <thead>
                <tr>{["RAG","Proyecto","Cliente","Tipo","Avance H.","🟦 MOD","🟣 COO","Avance Alcance","Desviación","Equipo","Entrega"].map(h=>(
                  <th key={h} style={S2.thr}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>

// Helper: count working days (Mon–Fri) between two date strings
function workingDays(iniStr, finStr) {
  if(!iniStr || !finStr) return 0;
  var s = parseD(iniStr), e = parseD(finStr), count = 0;
  var d = new Date(s);
  while(d <= e) {
    var day = d.getDay();
    if(day !== 0 && day !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

// Calculate horas from fechaIni + fechaFin + pct + horasDia
function calcHoras(fechaIni, fechaFin, pct, horasDia) {
  var days = workingDays(fechaIni, fechaFin);
  var hd = horasDia || 8;
  var p = pct || 100;
  return Math.round(days * hd * p / 100);
}

function parseFechaExcel(v) {
  if (!v) return "";
  if (typeof v === "number") {
    var d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return d.toISOString().slice(0, 10);
  }
  var s = String(v).trim();
  var m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    var yr = m[3].length === 2 ? "20" + m[3] : m[3];
    return yr + "-" + m[2].padStart(2,"0") + "-" + m[1].padStart(2,"0");
  }
  return s;
}

function parsearExcel(arrayBuffer) {
  var XLSX = window.XLSX;
  if (!XLSX) throw new Error("Librería Excel no cargada. Recarga la página.");
  var wb = XLSX.read(arrayBuffer, { type: "array" });

  function toRows(name) {
    var ws = wb.Sheets[name];
    if (!ws) return [];
    return XLSX.utils.sheet_to_json(ws, { defval: "" });
  }

  var pRows  = toRows("projects");
  var peRows = toRows("people");
  var aRows  = toRows("assignments");
  var abRows = toRows("absences");

  if (!pRows.length && !peRows.length) {
    throw new Error("No se encontraron hojas 'projects' o 'people'. Verifica los nombres exactos de las hojas.");
  }

  var proyectos = pRows.map(function(r) {
    return {
      id:              String(r.id || r.ID || "").trim(),
      name:            String(r.name || r.nombre || "").trim(),
      client:          String(r.client || r.cliente || "").trim(),
      status:          String(r.status || r.estado || "activo").trim(),
      horasOferta:     Number(r.horasOferta || r.horas_oferta || 0),
      horasConsumidas: Number(r.horasConsumidas || r.horas_consumidas || 0),
      horasOfertaMod:  Number(r.horasOfertaMod || 0),
      horasOfertaCoo:  Number(r.horasOfertaCoo || 0),
      horasConsMod:    Number(r.horasConsMod || 0),
      horasConsCoo:    Number(r.horasConsCoo || 0),
      tipo:            String(r.tipo || "OT").trim(),
      bimId:           String(r.bimId || r.bim_id || "").trim(),
      inicio:          parseFechaExcel(r.inicio || r.fechaInicio || r.fecha_inicio),
      fin:             parseFechaExcel(r.fin || r.fechaFin || r.fecha_fin),
      entrega:         parseFechaExcel(r.entrega || r.fechaEntrega || r.fecha_entrega),
      hitos:           [],
    };
  }).filter(function(p) { return p.id; });

  var personas = peRows.map(function(r, i) {
    return {
      id:       String(r.id || r.ID || ("p" + String(i+1).padStart(2,"0"))).trim(),
      name:     String(r.name || r.nombre || "").trim(),
      software: String(r.software || "Revit").trim(),
      status:   String(r.status || r.estado || "activo").trim(),
      horasDia: Number(r.horasDia || r.horas_dia || 8),
    };
  }).filter(function(p) { return p.name; });

  var asignaciones = aRows.map(function(r) {
    return {
      personId:    String(r.personId || r.persona_id || r.persona || "").trim(),
      projectId:   String(r.projectId || r.proyecto_id || r.proyecto || "").trim(),
      horas:       Number(r.horas || 0),
      horasReales: Number(r.horasReales || r.horas_reales || 0),
      rol:         String(r.rol || "Modelado").trim(),
      software:    String(r.software || "Revit").trim(),
      fechaIni:    parseFechaExcel(r.fechaIni || r.fecha_ini || r.fecha_inicio),
      fechaFin:    parseFechaExcel(r.fechaFin || r.fecha_fin),
      pct:         r.pct !== "" ? Number(r.pct) : null,
    };
  }).filter(function(a) { return a.personId && a.projectId; });

  var ausencias = abRows.map(function(r) {
    return {
      id:       String(r.id || String(Date.now()) + "_" + String(Math.random())).trim(),
      personId: String(r.personId || r.persona_id || "").trim(),
      tipo:     String(r.tipo || "Vacaciones").trim(),
      inicio:   parseFechaExcel(r.inicio || r.fechaInicio),
      fin:      parseFechaExcel(r.fin || r.fechaFin),
    };
  }).filter(function(a) { return a.personId; });

  return { projects: proyectos, people: personas, assignments: asignaciones, absences: ausencias };
}

    const p = people.find(x => x.id === personId);
    return p ? (p.horasDia || 8) : 8;
  };

  const horasByPerson = useMemo(() => {
    const m = {};
    for(const a of assignments) m[a.personId] = (m[a.personId]||0) + a.horas;
    return m;
  }, [assignments]);

  // Recalculate horas when modal date/pct changes
  const recalcModal = (fechaIni, fechaFin, pct, personId) => {
    const hd = getPersonHorasDia(personId || (modal && modal.personId) || "");
    const h = calcHoras(fechaIni, fechaFin, pct, hd);
    setMHorasCalc(h);
    if(h > 0) setMHoras(String(h));
  };

  const removeAssignment = (personId, projectId, rol) => {
    update({assignments: assignments.filter(a => {
      if(a.personId !== personId || a.projectId !== projectId) return true;
      if(rol != null) return a.rol !== rol;
      return false;
    })});
    showToast("Asignación eliminada");
  };

  const addAssignment = () => {
    const h = parseInt(mHoras);
    if(!h || h <= 0) return;
    const perId = modal.type === "to-project" ? mPersonId : modal.personId;
    const prId  = modal.type === "to-project" ? modal.projectId : mProjectId;
    if(!perId || !prId) return;
    const exists = assignments.find(a => a.personId===perId && a.projectId===prId && a.rol===mRol);
    const entry = {personId:perId, projectId:prId, horas:h, rol:mRol, software:mSoftware,
      fechaIni:mFechaIni||null, fechaFin:mFechaFin||null, pct:mPct||null};
    const newA = exists
      ? assignments.map(a => a.personId===perId && a.projectId===prId && a.rol===mRol ? {...a, ...entry} : a)
      : [...assignments, entry];
    update({assignments: newA});
    setModal(null); setMHoras(""); setMPersonId(""); setMProjectId(""); setMRol("Modelado"); setMSoftware("Revit");
    setMFechaIni(""); setMFechaFin(""); setMPct(100); setMHorasCalc(0);
    showToast("Asignación guardada ✓");
  };

  const saveEditHoras = () => {
    const h = parseInt(editVal);
    if(!h || h <= 0) { setEditKey(null); return; }
    const parts = editKey.split("|");
    const perId = parts[0], prId = parts[1], rol = parts[2] || null;
    update({assignments: assignments.map(a =>
      a.personId===perId && a.projectId===prId && (rol===null || a.rol===rol || (!a.rol && rol==="")) ? {...a, horas:h} : a
    )});
    setEditKey(null);
    showToast("Horas actualizadas ✓");
  };

  const saveEditConsumed = () => {
    const h = parseInt(editProjVal);
    if(isNaN(h) || h < 0) { setEditProjKey(null); return; }
    update({projects: projects.map(p => p.id===editProjKey ? {...p, horasConsumidas:h} : p)});
    setSelProject(prev => prev && prev.id===editProjKey ? {...prev, horasConsumidas:h} : prev);
    setEditProjKey(null);
    showToast("Horas consumidas actualizadas ✓");
  };

  const saveEditReal = () => {
    const h = parseInt(editRealVal);
    if(isNaN(h) || h < 0) { setEditRealKey(null); return; }
    const [perId, prId] = editRealKey.replace("real|","").split("|");
    update({assignments: assignments.map(a =>
      a.personId===perId && a.projectId===prId ? {...a, horasReales:h} : a
    )});
    setEditRealKey(null);
    showToast("Horas reales actualizadas ✓");
  };

  const saveDates = () => {
    if(!dInicio || !dFin) { setDateModal(null); return; }
    update({projects: projects.map(p => p.id===dateModal.projectId
      ? {...p, inicio:dInicio, fin:dFin, entrega:dEntrega||p.entrega} : p
    )});
    setDateModal(null);
    showToast("Fechas actualizadas ✓");
  };

  const updatePersonStatus = (personId, newStatus) => {
    update({people: people.map(p => p.id===personId ? {...p, status:newStatus} : p)});
  };

  const toggleProjSel   = (id) => setSelProjIds(prev   => { const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });
  const togglePersonSel = (id) => setSelPersonIds(prev  => { const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });
  const toggleAllProjs  = ()   => setSelProjIds(prev    => prev.size===filteredProjects.length ? new Set() : new Set(filteredProjects.map(p=>p.id)));
  const toggleAllPeople = ()   => setSelPersonIds(prev  => prev.size===filteredPeople.length   ? new Set() : new Set(filteredPeople.map(p=>p.id)));

  const deleteSelProjects = () => {
    if(selProjIds.size===0) return;
    if(!window.confirm("Eliminar "+selProjIds.size+" proyecto(s)?")) return;
    const ids = selProjIds;
    update({ projects:projects.filter(p=>!ids.has(p.id)), assignments:assignments.filter(a=>!ids.has(a.projectId)) });
    setSelProjIds(new Set()); showToast(ids.size+" proyecto(s) eliminados");
  };

  const deleteSelPeople = () => {
    if(selPersonIds.size===0) return;
    if(!window.confirm("Eliminar "+selPersonIds.size+" persona(s)?")) return;
    const ids = selPersonIds;
    update({ people:people.filter(p=>!ids.has(p.id)), assignments:assignments.filter(a=>!ids.has(a.personId)) });
    setSelPersonIds(new Set()); showToast(ids.size+" persona(s) eliminadas");
  };

  const filteredProjects = projects.filter(p => {
    const q = search.toLowerCase();
    const ok = p.name.toLowerCase().includes(q)||p.client.toLowerCase().includes(q)||p.id.toLowerCase().includes(q);
    const closed = p.status==="Cerrado";
    const matchSt = projStatusFilter==="Todos"?true:projStatusFilter==="Activos"?!closed:closed;
    return ok && matchSt;
  });

  const filteredPeople = people.filter(p => {
    const q = search.toLowerCase();
    const ok = p.name.toLowerCase().includes(q)||p.perfil.toLowerCase().includes(q);
    const sw = softwareFilter==="Todos"||p.software===softwareFilter||(softwareFilter!=="Ambos"&&p.software==="Ambos");
    return ok && sw;
  });

  const totalOferta    = projects.reduce((s,p)=>s+p.horasOferta,0);
  const totalConsumidas= projects.reduce((s,p)=>s+p.horasConsumidas,0);
  const enRiesgo       = projects.filter(p=>p.horasOferta>0&&p.horasConsumidas/p.horasOferta>1).length;
  const activos        = people.filter(p=>p.status==="Activo"||p.status==="Activa"||p.status==="Remota").length;
  const activosHoy     = projects.filter(p=>p.inicio&&p.fin&&parseD(p.inicio)<=TODAY&&parseD(p.fin)>=TODAY).length;

  const EMPTY_PROJ   = {name:"",client:"",bimId:"",tipo:"MOD",status:"Inicio",horasOferta:0,horasConsumidas:0,horasOfertaMod:0,horasOfertaCoo:0,horasConsMod:0,horasConsCoo:0,inicio:"",fin:"",entrega:"",hitos:[]};
  const EMPTY_PERSON = {name:"",perfil:"BIM Modelador",ubicacion:"Madrid",status:"Activo",software:"Revit",horasDia:8};

  const openNewProject  = () => setProjFormModal({mode:"new",  data:{...EMPTY_PROJ}});
  const openEditProject = (p) => setProjFormModal({mode:"edit", data:{...p, hitos:p.hitos||[]}});
  const openNewPerson   = () => setPersonFormModal({mode:"new",  data:{...EMPTY_PERSON}});
  const openEditPerson  = (p) => setPersonFormModal({mode:"edit", data:{...p}});

  const saveProjForm = () => {
    const d = projFormModal.data;
    if(!d.name.trim()||!d.client.trim()) return;
    if(projFormModal.mode==="new") {
      const id = "OT_"+d.name.replace(/\s+/g,"_").replace(/[^a-zA-Z0-9_]/g,"").slice(0,20)+"_"+Date.now().toString().slice(-4);
      update({projects:[...projects,{...d,id,horasOferta:Number(d.horasOferta)||0,horasConsumidas:Number(d.horasConsumidas)||0,hitos:d.hitos||[]}]});
      showToast("Proyecto creado ✓");
    } else {
      update({projects:projects.map(p=>p.id===d.id?{...d,horasOferta:Number(d.horasOferta)||0,horasConsumidas:Number(d.horasConsumidas)||0}:p)});
      setSelProject(prev=>prev&&prev.id===d.id?{...d}:prev);
      showToast("Proyecto actualizado ✓");
    }
    setProjFormModal(null);
  };

  const savePersonForm = () => {
    const d = personFormModal.data;
    if(!d.name.trim()) return;
    if(personFormModal.mode==="new") {
      update({people:[...people,{...d,id:"p"+String(Date.now()).slice(-6)}]});
      showToast("Persona añadida ✓");
    } else {
      update({people:people.map(p=>p.id===d.id?{...d}:p)});
      setSelPerson(prev=>prev&&prev.id===d.id?{...d}:prev);
      showToast("Persona actualizada ✓");
    }
    setPersonFormModal(null);
  };

  const S = {
    app:  {fontFamily:"'DM Sans',sans-serif",background:"#0f172a",minHeight:"100vh",color:"#e2e8f0"},
    hdr:  {background:"#1e293b",borderBottom:"1px solid #1e3a5f",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50},
    body: {padding:"20px 24px",maxWidth:1400,margin:"0 auto"},
    card: (sel)=>({background:"#1e293b",border:"1px solid "+(sel?"#3b82f6":"#1e3a5f"),borderRadius:12,overflow:"hidden",marginBottom:10,cursor:"pointer"}),
    det:  {background:"#162032",border:"1px solid #1e3a5f",borderRadius:14,padding:22,marginBottom:16},
    kpi:  {background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,padding:"14px 16px"},
    tabs: {display:"flex",gap:4,background:"#0f172a",borderRadius:10,padding:4},
    tab:  (a)=>({padding:"7px 18px",borderRadius:7,fontSize:13,fontWeight:600,cursor:"pointer",border:"none",transition:"all .15s",background:a?"#3b82f6":"transparent",color:a?"#fff":"#64748b"}),
    srch: {background:"#1e293b",border:"1px solid #334155",borderRadius:10,padding:"10px 16px",color:"#e2e8f0",fontSize:13,width:"100%",marginBottom:18,outline:"none"},
    btn:  (v)=>{
      const b={border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"};
      if(v==="primary") return {...b,background:"#3b82f6",color:"#fff"};
      if(v==="danger")  return {...b,background:"#ef4444",color:"#fff"};
      if(v==="ghost")   return {...b,background:"transparent",color:"#64748b",padding:"4px 8px"};
      if(v==="outline") return {...b,background:"transparent",border:"1px solid #334155",color:"#94a3b8"};
      return {...b,background:"#334155",color:"#e2e8f0"};
    },
    row:  {display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid #0f172a"},
    inp:  {background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontSize:13,width:"100%",outline:"none",marginTop:6},
    sel:  {background:"#0f172a",border:"1px solid #334155",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontSize:13,width:"100%",outline:"none",marginTop:6},
    lbl:  {fontSize:11,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3,display:"block"},
    num:  {background:"#0f172a",border:"1px solid #334155",borderRadius:6,padding:"4px 10px",color:"#e2e8f0",fontSize:13,fontWeight:700,cursor:"pointer"},
    mover:{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"},
    mbox: {background:"#1e293b",border:"1px solid #334155",borderRadius:16,padding:28,width:480,maxWidth:"92vw",maxHeight:"92vh",overflowY:"auto"},
  };

  return (
    <div style={S.app}>

      {toast && (
        <div style={{position:"fixed",bottom:24,right:24,zIndex:200,background:"#22c55e",color:"#fff",borderRadius:10,padding:"10px 18px",fontSize:13,fontWeight:600,boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>
          {toast}
        </div>
      )}

      {/* HEADER */}
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:8,background:"linear-gradient(135deg,#3b82f6,#0ea5e9)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:"#fff"}}>B</div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#f1f5f9",letterSpacing:"-0.3px"}}>CBS BIM Office</div>
            <div style={{fontSize:10,color:"#64748b",letterSpacing:"0.5px",textTransform:"uppercase"}}>Gestión de proyectos y equipo · 2026</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={S.tabs}>
            <button style={S.tab(view==="projects")} onClick={()=>{setView("projects");setSelProject(null);setSearch("");}}>📋 Proyectos</button>
            <button style={S.tab(view==="people")}   onClick={()=>{setView("people");setSelPerson(null);setSearch("");}}>👥 Personas</button>
            <button style={S.tab(view==="calendar")} onClick={()=>{setView("calendar");setSearch("");}}>📅 Calendario</button>
            <button style={S.tab(view==="report")}   onClick={()=>{setView("report");setSearch("");}}>📊 Informe</button>
          </div>
          <button onClick={()=>{setShowDataModal(true);setImportText("");setImportError("");}} style={{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}} title="Importar / Exportar datos">
            ⬆️⬇️ Datos
          </button>
        </div>
      </div>

      <div style={S.body}>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:22}}>
          {[
            {label:"Proyectos",       value:projects.length,                                 sub:enRiesgo+" en riesgo",           c:enRiesgo>0?"#ef4444":"#22c55e"},
            {label:"Activos hoy",     value:activosHoy,                                      sub:"proyectos en marcha",           c:"#3b82f6"},
            {label:"Equipo activo",   value:activos+"/26",                                   sub:"personas disponibles",          c:"#3b82f6"},
            {label:"H. oferta total", value:totalOferta.toLocaleString()+"h",                sub:totalConsumidas.toLocaleString()+"h consumidas", c:"#f59e0b"},
            {label:"Avance global",   value:Math.round(totalConsumidas/totalOferta*100)+"%", sub:"consumidas sobre oferta",       c:"#22c55e"},
          ].map(k=>(
            <div key={k.label} style={S.kpi}>
              <div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>{k.label}</div>
              <div style={{fontSize:22,fontWeight:800,color:"#f1f5f9",letterSpacing:"-0.5px"}}>{k.value}</div>
              <div style={{fontSize:11,color:k.c,marginTop:4}}>{k.sub}</div>
            </div>
          ))}
        </div>

        {/* CALENDAR */}
        {view==="calendar" && (
          <div>
            <div style={{display:"flex",gap:4,background:"#0f172a",borderRadius:10,padding:4,marginBottom:20,width:"fit-content"}}>
              <button style={S.tab(calTab==="proyectos")} onClick={()=>setCalTab("proyectos")}>📅 Proyectos</button>
              <button style={S.tab(calTab==="equipo")}    onClick={()=>setCalTab("equipo")}>👤 Equipo</button>
            </div>
            {calTab==="proyectos"
              ? <GanttView projects={projects} assignments={assignments}/>
              : <PeopleGanttView projects={projects} people={people} assignments={assignments} absences={absences} onUpdateAbsences={abs=>update({absences:abs})}/>
            }
          </div>
        )}

        {/* REPORT */}
        {view==="report" && <ReportView projects={projects} people={people} assignments={assignments}/>}

        {/* PROJECTS VIEW */}
        {view==="projects" && (
          <div>
            <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <input placeholder="Buscar proyecto, cliente, código OT…" value={search} onChange={e=>setSearch(e.target.value)} style={{...S.srch,marginBottom:0,flex:1,minWidth:180}}/>
              <div style={{display:"flex",gap:3,background:"#0f172a",borderRadius:8,padding:3}}>
                {[{id:"Activos",label:"🟢 Activos"},{id:"Cerrados",label:"⬛ Cerrados"},{id:"Todos",label:"Todos"}].map(f=>(
                  <button key={f.id} onClick={()=>setProjStatusFilter(f.id)}
                    style={{border:"none",borderRadius:6,padding:"6px 13px",fontSize:11,fontWeight:600,cursor:"pointer",background:projStatusFilter===f.id?"#3b82f6":"transparent",color:projStatusFilter===f.id?"#fff":"#64748b"}}>
                    {f.label}
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:2,background:"#0f172a",borderRadius:8,padding:3}}>
                <button onClick={()=>{setProjView("cards");setSelProjIds(new Set());}} style={{border:"none",borderRadius:6,padding:"6px 10px",fontSize:14,cursor:"pointer",background:projView==="cards"?"#3b82f6":"transparent",color:projView==="cards"?"#fff":"#64748b"}}>⊞</button>
                <button onClick={()=>{setProjView("table");setSelProjIds(new Set());}} style={{border:"none",borderRadius:6,padding:"6px 10px",fontSize:14,cursor:"pointer",background:projView==="table"?"#3b82f6":"transparent",color:projView==="table"?"#fff":"#64748b"}}>☰</button>
              </div>
              {projView==="table" && selProjIds.size>0 && (
                <button onClick={deleteSelProjects} style={{...S.btn("danger"),display:"flex",alignItems:"center",gap:6}}>🗑️ Eliminar {selProjIds.size}</button>
              )}
              <button style={{...S.btn("primary"),whiteSpace:"nowrap",padding:"10px 18px",fontSize:13}} onClick={openNewProject}>+ Nuevo proyecto</button>
            </div>

            {/* PROJECT DETAIL */}
            {selProject && projView==="cards" && (() => {
              const proj = selProject;
              const asgns = asgnByProject(proj.id);
              const rent = rentColor(proj.horasOferta,proj.horasConsumidas);
              const pct = proj.horasOferta>0?Math.round(proj.horasConsumidas/proj.horasOferta*100):0;
              const isEditC = editProjKey===proj.id;
              const hitos = proj.hitos||[];
              return (
                <div style={S.det}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                    <div>
                      <div style={{display:"flex",gap:6,marginBottom:6}}>
                        <Badge bg={tipoColor(proj.tipo)+"25"} text={tipoColor(proj.tipo)}>{proj.tipo}</Badge>
                        <Badge bg={rent.bg} text={rent.text}>{rent.label}</Badge>
                        <Badge bg={proj.status==="En curso"?"#d1fae5":"#fef3c7"} text={proj.status==="En curso"?"#065f46":"#92400e"}>{proj.status}</Badge>
                      </div>
                      <div style={{fontSize:20,fontWeight:800,color:"#f1f5f9"}}>{proj.name}</div>
                      <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{proj.client} · {proj.bimId}</div>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <button style={S.btn("outline")} onClick={()=>{setDateModal({projectId:proj.id});setDInicio(proj.inicio||"");setDFin(proj.fin||"");setDEntrega(proj.entrega||"");}}>📅 Fechas</button>
                      <button style={S.btn("outline")} onClick={()=>openEditProject(proj)}>✏️ Editar</button>
                      <button style={S.btn("ghost")}   onClick={()=>setSelProject(null)}>✕</button>
                    </div>
                  </div>

                  {proj.inicio && (
                    <div style={{display:"flex",gap:16,marginBottom:14,padding:"10px 14px",background:"#0f172a",borderRadius:8,flexWrap:"wrap"}}>
                      {[{label:"Inicio",value:fmtD(parseD(proj.inicio)),color:"#22c55e"},{label:"Fin est.",value:fmtD(parseD(proj.fin)),color:"#f59e0b"},{label:"Entrega",value:proj.entrega?fmtD(parseD(proj.entrega)):"—",color:"#f97316"}].map(d=>(
                        <div key={d.label}>
                          <div style={{fontSize:10,color:"#475569",textTransform:"uppercase",letterSpacing:"0.5px"}}>{d.label}</div>
                          <div style={{fontSize:12,fontWeight:700,color:d.color}}>{d.value}</div>
                        </div>
                      ))}
                    </div>
                  )}

                  {/* Hitos */}
                  {hitos.length>0 && (
                    <div style={{marginBottom:16,padding:"12px 14px",background:"#0f172a",borderRadius:8}}>
                      <div style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:8}}>Hitos de entrega</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                        {hitos.map((h,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:20,background:h.ok?"#22c55e20":"#f59e0b15",border:"1px solid "+(h.ok?"#22c55e40":"#f59e0b40")}}>
                            <span style={{fontSize:10}}>{h.ok?"✅":"🔶"}</span>
                            <span style={{fontSize:11,fontWeight:600,color:h.ok?"#22c55e":"#f59e0b"}}>{h.n}</span>
                            {h.fecha && <span style={{fontSize:9,color:"#64748b"}}>{fmtShort(parseD(h.fecha))}</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                    {[{label:"Modelado",oferta:proj.horasOfertaMod||0,cons:proj.horasConsMod||0,color:"#3b82f6"},{label:"Coordinación",oferta:proj.horasOfertaCoo||0,cons:proj.horasConsCoo||0,color:"#a78bfa"}].map(seg=>{
                      const sp=seg.oferta>0?Math.round(seg.cons/seg.oferta*100):0;
                      return (
                        <div key={seg.label} style={{background:"#0f172a",borderRadius:8,padding:"12px 14px",border:"1px solid "+seg.color+"30"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                            <span style={{fontSize:10,fontWeight:700,color:seg.color,textTransform:"uppercase",letterSpacing:"0.5px"}}>{seg.label}</span>
                            <span style={{fontSize:11,fontWeight:700,color:progressColor(sp)}}>{sp}%</span>
                          </div>
                          <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:6}}>
                            <span style={{fontSize:20,fontWeight:800,color:"#f1f5f9"}}>{seg.cons}h</span>
                            <span style={{fontSize:12,color:"#475569"}}>/ {seg.oferta}h oferta</span>
                          </div>
                          <div style={{background:"#1e293b",borderRadius:99,height:5,overflow:"hidden"}}>
                            <div style={{width:Math.min(sp,100)+"%",height:"100%",background:seg.color,borderRadius:99}}/>
                          </div>
                        </div>

                          {a.software && <span style={{background:swC+"15",color:swC,fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20}}>{a.software}</span>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          {isEdA?(
                            <div style={{display:"flex",gap:2,justifyContent:"flex-end",alignItems:"center"}}>
                              <input type="number" value={editVal} autoFocus onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEditHoras()} style={{...S.inp,width:56,marginTop:0,padding:"3px 6px",textAlign:"center",fontSize:11}}/>
                              <button style={{...S.btn("primary"),padding:"3px 6px",fontSize:10}} onClick={saveEditHoras}>✓</button>
                            </div>
                          ):(
                            <button style={{...S.num,fontSize:12}} onClick={()=>{setEditKey(key);setEditVal(String(a.horas));}}>{a.horas}h</button>
                          )}
                        </div>
                        <div style={{textAlign:"right"}}>
                          {isEdR?(
                            <div style={{display:"flex",gap:2,justifyContent:"flex-end",alignItems:"center"}}>
                              <input type="number" value={editRealVal} autoFocus onChange={e=>setEditRealVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEditReal()} style={{...S.inp,width:56,marginTop:0,padding:"3px 6px",textAlign:"center",fontSize:11}}/>
                              <button style={{...S.btn("primary"),padding:"3px 6px",fontSize:10}} onClick={saveEditReal}>✓</button>

                            <button onClick={()=>{setEditRealKey(realKey);setEditRealVal(String(reales));}} style={{background:"#0f172a",border:"1px solid #1e3a5f",borderRadius:6,padding:"4px 10px",color:"#3b82f6",fontSize:12,fontWeight:700,cursor:"pointer"}}>{reales}h</button>
                          )}
