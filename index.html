                        <div>
                          <div style={{background:"#0f172a",borderRadius:99,height:6,overflow:"hidden"}}>
                            <div style={{width:Math.min(pctEj,100)+"%",height:"100%",background:ejC,borderRadius:99}}/>
                          </div>
                          <div style={{fontSize:9,fontWeight:700,color:ejC,textAlign:"center",marginTop:2}}>{pctEj}%</div>
                        </div>
                        <button style={S.btn("ghost")} onClick={()=>removeAssignment(a.personId,a.projectId,a.rol)}>
                          <span style={{color:"#ef4444",fontSize:14}}>×</span>
                        </button>
                      </div>
                    );
                  })}

                  {/* AUSENCIAS */}
                  <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #1e3a5f"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.5px"}}>🗓️ Ausencias — {(absences||[]).filter(ab=>ab.personId===person.id).length}</div>
                      <button style={S.btn("outline")} onClick={()=>{const newAb={id:"ab"+Date.now(),personId:person.id,tipo:"Vacaciones",inicio:"",fin:"",nota:""};update({absences:[...(absences||[]),newAb]});}}>+ Añadir ausencia</button>
                    </div>
                    {(absences||[]).filter(ab=>ab.personId===person.id).length===0 && (
                      <div style={{color:"#334155",textAlign:"center",padding:"12px 0",fontSize:12}}>Sin ausencias registradas</div>
                    )}
                    {(absences||[]).filter(ab=>ab.personId===person.id).map((ab,ai)=>{
                      const hasConflict=ab.inicio&&ab.fin&&asgns.some(a=>{
                        const proj=projects.find(p=>p.id===a.projectId);
                        if(!proj) return false;
                        const iniP=a.fechaIni||proj.inicio; const finP=a.fechaFin||proj.fin;
                        if(!iniP||!finP) return false;
                        return parseD(iniP)<=parseD(ab.fin)&&parseD(finP)>=parseD(ab.inicio);
                      });
                      const abColor=ab.tipo==="Vacaciones"?"#f59e0b":ab.tipo==="Baja"?"#ef4444":"#a78bfa";
                      return (
                        <div key={ab.id||ai} style={{display:"grid",gridTemplateColumns:"auto 1fr 1fr auto auto",gap:8,alignItems:"center",padding:"8px 10px",marginBottom:6,borderRadius:8,background:"#0f172a",border:"1px solid "+(hasConflict?"#ef4444":"#1e3a5f")}}>
                          <select value={ab.tipo||"Vacaciones"} onChange={e=>update({absences:(absences||[]).map(x=>x.id===ab.id?{...x,tipo:e.target.value}:x)})}
                            style={{background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"4px 8px",color:abColor,fontSize:11,fontWeight:700,cursor:"pointer",outline:"none"}}>
                            <option value="Vacaciones">🟡 Vacaciones</option>
                            <option value="Baja">🔴 Baja</option>
                            <option value="Permiso">🟣 Permiso</option>
                          </select>
                          <div>
                            <div style={{fontSize:9,color:"#475569",marginBottom:2}}>INICIO</div>
                            <input type="date" value={ab.inicio||""} onChange={e=>update({absences:(absences||[]).map(x=>x.id===ab.id?{...x,inicio:e.target.value}:x)})} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"4px 8px",color:"#e2e8f0",fontSize:12,outline:"none",width:"100%"}}/>
                          </div>
                          <div>
                            <div style={{fontSize:9,color:"#475569",marginBottom:2}}>FIN</div>
                            <input type="date" value={ab.fin||""} onChange={e=>update({absences:(absences||[]).map(x=>x.id===ab.id?{...x,fin:e.target.value}:x)})} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:6,padding:"4px 8px",color:"#e2e8f0",fontSize:12,outline:"none",width:"100%"}}/>
                          </div>
                          {hasConflict?<span style={{fontSize:10,fontWeight:700,color:"#ef4444",whiteSpace:"nowrap"}}>⚠ Conflicto</span>:<span/>}
                          <button onClick={()=>update({absences:(absences||[]).filter(x=>x.id!==ab.id)})} style={{border:"none",background:"none",color:"#ef4444",cursor:"pointer",fontSize:16,fontWeight:700,padding:"0 4px"}}>×</button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* PEOPLE CARDS */}
            {peopleView==="cards" && filteredPeople.map(person=>{
              const asgns=asgnByPerson(person.id);
              const totalAsig=asgns.reduce((s,a)=>s+a.horas,0);
              const totalReal=asgns.reduce((s,a)=>s+(a.horasReales||0),0);
              const cargaPct=Math.round(totalAsig/MAX_H*100);
              const sc=statusColor(person.status);
              const sel=selPerson&&selPerson.id===person.id;
              const swC=person.software==="Revit"?"#3b82f6":person.software==="Civil 3D"?"#f59e0b":"#22c55e";
              return (
                <div key={person.id} style={S.card(sel)}>
                  <div style={{padding:"13px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}} onClick={()=>setSelPerson(sel?null:person)}>
                    <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                      <div style={{position:"relative"}}>
                        <Avatar name={person.name} status={person.status}/>
                        <div style={{position:"absolute",bottom:-2,right:-2,width:12,height:12,borderRadius:"50%",background:swC,border:"2px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:6,fontWeight:900,color:"#fff"}}>
                          {person.software==="Civil 3D"?"C":person.software==="Ambos"?"A":"R"}
                        </div>
                      </div>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{person.name}</div>
                        <div style={{fontSize:11,color:"#64748b"}}>{person.perfil} · {person.ubicacion} · <span style={{color:"#f59e0b"}}>{person.horasDia||8}h/día</span></div>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      <span style={{background:swC+"20",color:swC,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap"}}>{person.software}</span>
                      <Badge bg={sc.bg} text={sc.text}>{person.status}</Badge>
                      <span style={{fontSize:11,color:"#64748b"}}>{asgns.length} proy.</span>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#e2e8f0"}}>{totalReal}h <span style={{color:"#475569",fontWeight:400}}>/ {totalAsig}h</span></div>
                        <div style={{fontSize:9,color:"#475569"}}>reales / asig.</div>
                      </div>
                      <Bar pct={cargaPct} width={72}/>
                      <span style={{fontSize:11,fontWeight:600,width:34,textAlign:"right",color:progressColor(cargaPct)}}>{cargaPct}%</span>
                      <button style={{...S.btn("ghost"),padding:"4px 6px",fontSize:11,color:"#94a3b8"}} onClick={e=>{e.stopPropagation();openEditPerson(person);}}>✏️</button>
                    </div>
                  </div>
                </div>
              );
            })}

            {/* PEOPLE TABLE */}
            {peopleView==="table" && filteredPeople.length>0 && (
              <div style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,overflow:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",minWidth:820}}>
                  <thead>
                    <tr style={{background:"#0f172a"}}>
                      <th style={{padding:"10px 12px",width:36}}>
                        <input type="checkbox" checked={selPersonIds.size===filteredPeople.length&&filteredPeople.length>0} onChange={toggleAllPeople} style={{cursor:"pointer",width:14,height:14,accentColor:"#3b82f6"}}/>
                      </th>
                      {["Nombre","Perfil","Ubicación","Software","Jornada","Estado","Proy.","H.Asig.","H.Reales","Carga",""].map(h=>(
                        <th key={h} style={{padding:"8px 10px",fontSize:9,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:"0.4px",whiteSpace:"nowrap",textAlign:"left"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filteredPeople.map((person,i)=>{
                      const asgns=asgnByPerson(person.id);
                      const totalAsig=asgns.reduce((s,a)=>s+a.horas,0);
                      const totalReal=asgns.reduce((s,a)=>s+(a.horasReales||0),0);
                      const cargaPct=Math.round(totalAsig/MAX_H*100);
                      const col=progressColor(cargaPct);
                      const swC=person.software==="Revit"?"#3b82f6":person.software==="Civil 3D"?"#f59e0b":"#22c55e";
                      const cs={padding:"7px 10px",fontSize:11,borderBottom:"1px solid #0f172a",color:"#e2e8f0",verticalAlign:"middle"};
                      const selP=selPersonIds.has(person.id);
                      const sc=statusColor(person.status);
                      return (
                        <tr key={person.id} style={{background:selP?"#1e3a8a30":i%2===0?"#1e293b":"#162032"}}>
                          <td style={{...cs,textAlign:"center"}}>
                            <input type="checkbox" checked={selP} onChange={()=>togglePersonSel(person.id)} style={{cursor:"pointer",width:13,height:13,accentColor:"#3b82f6"}}/>
                          </td>
                          <td style={cs}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{width:24,height:24,borderRadius:"50%",background:"linear-gradient(135deg,#3b82f6,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{initials(person.name)}</div>
                              <span style={{fontWeight:700,color:"#f1f5f9",whiteSpace:"nowrap"}}>{person.name}</span>
                            </div>
                          </td>
                          <td style={{...cs,color:"#94a3b8"}}>{person.perfil}</td>
                          <td style={{...cs,color:"#64748b"}}>{person.ubicacion}</td>
                          <td style={cs}><span style={{background:swC+"20",color:swC,fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20}}>{person.software}</span></td>
                          <td style={{...cs,textAlign:"center",color:"#f59e0b",fontWeight:700}}>{person.horasDia||8}h/día</td>
                          <td style={cs}><span style={{background:sc.bg,color:sc.text,fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:20}}>{person.status}</span></td>
                          <td style={{...cs,textAlign:"center",color:"#94a3b8"}}>{asgns.length}</td>
                          <td style={{...cs,textAlign:"right",fontWeight:700}}>{totalAsig}h</td>
                          <td style={{...cs,textAlign:"right",fontWeight:700,color:"#3b82f6"}}>{totalReal}h</td>
                          <td style={cs}>
                            <div style={{display:"flex",alignItems:"center",gap:5}}>
                              <div style={{background:"#0f172a",borderRadius:99,height:4,width:48,overflow:"hidden"}}>
                                <div style={{width:Math.min(cargaPct,100)+"%",height:"100%",background:col}}/>
                              </div>
                              <span style={{fontSize:10,fontWeight:700,color:col,minWidth:28}}>{cargaPct}%</span>
                            </div>
                          </td>
                          <td style={{...cs,whiteSpace:"nowrap"}}>
                            <button onClick={()=>openEditPerson(person)} style={{border:"none",background:"#1e3a5f",color:"#94a3b8",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",marginRight:4}}>✏️</button>
                            <button onClick={()=>{if(window.confirm("¿Eliminar a "+person.name+"?")){update({people:people.filter(p=>p.id!==person.id),assignments:assignments.filter(a=>a.personId!==person.id)});showToast("Eliminada");}}} style={{border:"none",background:"#ef444420",color:"#ef4444",borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer"}}>🗑️</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <div style={{padding:"10px 16px",fontSize:11,color:"#475569",borderTop:"1px solid #0f172a",display:"flex",justifyContent:"space-between"}}>
                  <span>{filteredPeople.length} personas · {selPersonIds.size} seleccionadas</span>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ASSIGNMENT MODAL */}
        {modal && (
          <div style={S.mover} onClick={e=>e.target===e.currentTarget&&setModal(null)}>
            <div style={S.mbox}>
              <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9",marginBottom:4}}>
                {modal.type==="to-project"?"Asignar persona al proyecto":"Asignar proyecto a la persona"}
              </div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>
                {modal.type==="to-project"?projects.find(p=>p.id===modal.projectId)?.name:people.find(p=>p.id===modal.personId)?.name}
              </div>
              {modal.type==="to-project" ? (
                <div>
                  <label style={S.lbl}>Persona</label>
                  <select value={mPersonId} onChange={e=>{setMPersonId(e.target.value);const p=people.find(x=>x.id===e.target.value);if(p&&p.software)setMSoftware(p.software==="Ambos"?"Revit":p.software);if(mFechaIni&&mFechaFin){const hd=p?p.horasDia||8:8;setMHorasCalc(calcHoras(mFechaIni,mFechaFin,mPct,hd));setMHoras(String(calcHoras(mFechaIni,mFechaFin,mPct,hd)));}}} style={S.sel}>
                    <option value="">— Seleccionar —</option>
                    {people.filter(p=>p.status!=="Baja médica").map(p=>(
                      <option key={p.id} value={p.id}>{p.name} ({p.perfil} · {p.software||"Revit"} · {p.horasDia||8}h/día)</option>
                    ))}
                  </select>
                </div>
              ) : (
                <div>
                  <label style={S.lbl}>Proyecto</label>
                  <select value={mProjectId} onChange={e=>{setMProjectId(e.target.value);const proj=projects.find(x=>x.id===e.target.value);if(proj){setMFechaIni(mFechaIni||proj.inicio||"");setMFechaFin(mFechaFin||proj.fin||"");}}} style={S.sel}>
                    <option value="">— Seleccionar —</option>
                    {projects.map(p=><option key={p.id} value={p.id}>{p.name} ({p.client})</option>)}
                  </select>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:14}}>
                <div>
                  <label style={S.lbl}>Rol</label>
                  <select value={mRol} onChange={e=>setMRol(e.target.value)} style={S.sel}>
                    <option value="Modelado">🟦 Modelado</option>
                    <option value="Coordinación">🟣 Coordinación</option>
                  </select>
                </div>
                <div>
                  <label style={S.lbl}>Software</label>
                  <select value={mSoftware} onChange={e=>setMSoftware(e.target.value)} style={S.sel}>
                    <option value="Revit">Revit</option>
                    <option value="Civil 3D">Civil 3D</option>
                    <option value="Navisworks">Navisworks</option>
                    <option value="Otro">Otro</option>
                  </select>
                </div>
              </div>
              <div style={{background:"#0f172a",borderRadius:10,padding:"14px 16px",marginTop:16,border:"1px solid #1e3a5f"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#3b82f6",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:12}}>⚙️ Disponibilidad en este proyecto</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div>
                    <label style={S.lbl}>Fecha inicio en proyecto</label>
                    <input type="date" value={mFechaIni} onChange={e=>{setMFechaIni(e.target.value);recalcModal(e.target.value,mFechaFin,mPct,mPersonId||modal.personId);}} style={{...S.inp,marginTop:4}}/>
                  </div>
                  <div>
                    <label style={S.lbl}>Fecha fin en proyecto</label>
                    <input type="date" value={mFechaFin} onChange={e=>{setMFechaFin(e.target.value);recalcModal(mFechaIni,e.target.value,mPct,mPersonId||modal.personId);}} style={{...S.inp,marginTop:4}}/>
                  </div>
                </div>
                <div style={{marginTop:10}}>
                  <label style={S.lbl}>% Dedicación — {mPct}%</label>
                  <input type="range" min="10" max="100" step="5" value={mPct} onChange={e=>{setMPct(Number(e.target.value));recalcModal(mFechaIni,mFechaFin,Number(e.target.value),mPersonId||modal.personId);}} style={{width:"100%",accentColor:"#3b82f6",marginTop:4}}/>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginTop:2}}>
                    <span>10%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
                  </div>
                </div>
                {mHorasCalc>0 && (
                  <div style={{marginTop:10,padding:"8px 12px",background:"#3b82f620",borderRadius:8,border:"1px solid #3b82f640",fontSize:12,color:"#3b82f6",fontWeight:700,textAlign:"center"}}>
                    ⚡ Horas calculadas: {mHorasCalc}h ({workingDays(mFechaIni,mFechaFin)} días laborables × {getPersonHorasDia(mPersonId||modal.personId)}h/día × {mPct}%)
                  </div>
                )}
              </div>
              <div style={{marginTop:12}}>
                <label style={S.lbl}>Horas asignadas {mHorasCalc>0?"(calculadas automáticamente, puedes ajustar)":""}</label>
                <input type="number" value={mHoras} onChange={e=>setMHoras(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addAssignment()} placeholder="ej. 80" style={S.inp}/>
              </div>
              <div style={{display:"flex",gap:8,marginTop:20,justifyContent:"flex-end"}}>
                <button style={S.btn("default")} onClick={()=>setModal(null)}>Cancelar</button>
                <button style={S.btn("primary")} onClick={addAssignment}>Guardar asignación</button>
              </div>
            </div>
          </div>
        )}

        {/* DATE MODAL */}
        {dateModal && (
          <div style={S.mover} onClick={e=>e.target===e.currentTarget&&setDateModal(null)}>
            <div style={S.mbox}>
              <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9",marginBottom:20}}>
                Editar fechas — {projects.find(p=>p.id===dateModal.projectId)?.name}
              </div>
              {[{label:"Fecha inicio",val:dInicio,set:setDInicio},{label:"Fecha fin (estimada)",val:dFin,set:setDFin},{label:"Fecha entrega",val:dEntrega,set:setDEntrega}].map(f=>(
                <div key={f.label} style={{marginTop:12}}>
                  <label style={S.lbl}>{f.label}</label>
                  <input type="date" value={f.val} onChange={e=>f.set(e.target.value)} style={S.inp}/>
                </div>
              ))}
              <div style={{display:"flex",gap:8,marginTop:24,justifyContent:"flex-end"}}>
                <button style={S.btn("default")} onClick={()=>setDateModal(null)}>Cancelar</button>
                <button style={S.btn("primary")} onClick={saveDates}>Guardar fechas</button>
              </div>
            </div>
          </div>
        )}

        {/* PROJECT FORM MODAL */}
        {projFormModal && (
          <div style={S.mover} onClick={e=>e.target===e.currentTarget&&setProjFormModal(null)}>
            <div style={S.mbox}>
              <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9",marginBottom:20}}>
                {projFormModal.mode==="new"?"Nuevo proyecto":"Editar proyecto"}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {[{label:"Nombre del proyecto",field:"name",type:"text",span:2},{label:"Cliente",field:"client",type:"text"},{label:"Código BIM",field:"bimId",type:"text"},{label:"H. Oferta total",field:"horasOferta",type:"number"},{label:"H. Consumidas",field:"horasConsumidas",type:"number"},{label:"H. Oferta MOD",field:"horasOfertaMod",type:"number"},{label:"H. Oferta COO",field:"horasOfertaCoo",type:"number"},{label:"H. Cons. MOD",field:"horasConsMod",type:"number"},{label:"H. Cons. COO",field:"horasConsCoo",type:"number"},{label:"Fecha inicio",field:"inicio",type:"date"},{label:"Fecha fin",field:"fin",type:"date"},{label:"Fecha entrega",field:"entrega",type:"date",span:2}].map(f=>(
                  <div key={f.field} style={{gridColumn:f.span===2?"span 2":"auto"}}>
                    <label style={S.lbl}>{f.label}</label>
                    <input type={f.type} value={projFormModal.data[f.field]||""} onChange={e=>setProjFormModal(m=>({...m,data:{...m.data,[f.field]:e.target.value}}))} style={S.inp}/>
                  </div>
                ))}
                <div>
                  <label style={S.lbl}>Tipo</label>
                  <select value={projFormModal.data.tipo||"MOD"} onChange={e=>setProjFormModal(m=>({...m,data:{...m.data,tipo:e.target.value}}))} style={S.sel}>
                    {["MOD","COO","BEP","AT"].map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <label style={S.lbl}>Estado</label>
                  <select value={projFormModal.data.status||"Inicio"} onChange={e=>setProjFormModal(m=>({...m,data:{...m.data,status:e.target.value}}))} style={S.sel}>
                    {["En curso","Inicio","En espera","Cerrado"].map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>

              {/* HITOS EDITOR */}
              <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid #1e3a5f"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.5px"}}>◆ Hitos de entrega</div>
                  <button type="button" onClick={()=>setProjFormModal(m=>({...m,data:{...m.data,hitos:[...(m.data.hitos||[]),{n:"",fecha:"",ok:false}]}}))}
                    style={{border:"none",borderRadius:6,background:"#3b82f620",color:"#3b82f6",padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Añadir hito</button>
                </div>
                {(projFormModal.data.hitos||[]).length===0 && (
                  <div style={{fontSize:11,color:"#334155",textAlign:"center",padding:"8px 0"}}>Sin hitos. Pulsa + para añadir.</div>
                )}
                {(projFormModal.data.hitos||[]).map((h,hi)=>(
                  <div key={hi} style={{display:"grid",gridTemplateColumns:"auto 1fr auto auto",gap:8,alignItems:"center",marginBottom:8,padding:"8px 10px",background:"#0f172a",borderRadius:8,border:"1px solid "+(h.ok?"#22c55e30":"#1e3a5f")}}>
                    <input type="checkbox" checked={h.ok||false} onChange={e=>setProjFormModal(m=>({...m,data:{...m.data,hitos:m.data.hitos.map((x,j)=>j===hi?{...x,ok:e.target.checked}:x)}}))} style={{width:16,height:16,accentColor:"#22c55e",cursor:"pointer"}}/>
                    <div style={{display:"flex",gap:8}}>
                      <input type="text" value={h.n||""} placeholder="Nombre del hito…" onChange={e=>setProjFormModal(m=>({...m,data:{...m.data,hitos:m.data.hitos.map((x,j)=>j===hi?{...x,n:e.target.value}:x)}}))} style={{...S.inp,marginTop:0,flex:2,padding:"5px 8px",fontSize:12}}/>
                      <input type="date" value={h.fecha||""} onChange={e=>setProjFormModal(m=>({...m,data:{...m.data,hitos:m.data.hitos.map((x,j)=>j===hi?{...x,fecha:e.target.value}:x)}}))} style={{...S.inp,marginTop:0,flex:1,padding:"5px 8px",fontSize:11}}/>
                    </div>
                    <span style={{fontSize:10,color:h.ok?"#22c55e":"#64748b",fontWeight:700,whiteSpace:"nowrap"}}>{h.ok?"✅ OK":"⏳ Pend."}</span>
                    <button type="button" onClick={()=>setProjFormModal(m=>({...m,data:{...m.data,hitos:m.data.hitos.filter((_,j)=>j!==hi)}}))} style={{border:"none",background:"none",color:"#ef4444",cursor:"pointer",fontSize:16,fontWeight:700}}>×</button>
                  </div>
                ))}
              </div>

              <div style={{display:"flex",gap:8,marginTop:24,justifyContent:"space-between",alignItems:"center"}}>
                {projFormModal.mode==="edit"?(
                  <button style={S.btn("danger")} onClick={()=>{if(window.confirm("¿Eliminar este proyecto?")){update({projects:projects.filter(p=>p.id!==projFormModal.data.id),assignments:assignments.filter(a=>a.projectId!==projFormModal.data.id)});if(selProject&&selProject.id===projFormModal.data.id)setSelProject(null);setProjFormModal(null);showToast("Eliminado");}}}>Eliminar</button>
                ):<div/>}
                <div style={{display:"flex",gap:8}}>
                  <button style={S.btn("default")} onClick={()=>setProjFormModal(null)}>Cancelar</button>
                  <button style={S.btn("primary")} onClick={saveProjForm}>{projFormModal.mode==="new"?"Crear proyecto":"Guardar cambios"}</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* PERSON FORM MODAL */}
        {personFormModal && (
          <div style={S.mover} onClick={e=>e.target===e.currentTarget&&setPersonFormModal(null)}>
            <div style={S.mbox}>
              <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9",marginBottom:20}}>
                {personFormModal.mode==="new"?"Nueva persona":"Editar persona"}
              </div>
              {[{label:"Nombre completo",field:"name",type:"text"},{label:"Perfil / Rol",field:"perfil",type:"text"},{label:"Ubicación",field:"ubicacion",type:"text"}].map(f=>(
                <div key={f.field} style={{marginTop:12}}>
                  <label style={S.lbl}>{f.label}</label>
                  <input type={f.type} value={personFormModal.data[f.field]||""} onChange={e=>setPersonFormModal(m=>({...m,data:{...m.data,[f.field]:e.target.value}}))} style={S.inp}/>
                </div>
              ))}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}}>
                <div>
                  <label style={S.lbl}>Software principal</label>
                  <select value={personFormModal.data.software||"Revit"} onChange={e=>setPersonFormModal(m=>({...m,data:{...m.data,software:e.target.value}}))} style={S.sel}>
                    {["Revit","Civil 3D","Ambos"].map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <label style={S.lbl}>Estado</label>
                  <select value={personFormModal.data.status||"Activo"} onChange={e=>setPersonFormModal(m=>({...m,data:{...m.data,status:e.target.value}}))} style={S.sel}>
                    {["Activo","Activa","Remota","Baja médica","Sin asignar"].map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div style={{marginTop:12}}>
                <label style={S.lbl}>Jornada diaria (horas/día) — <span style={{color:"#f59e0b",fontWeight:800}}>{personFormModal.data.horasDia||8}h</span></label>
                <div style={{display:"flex",alignItems:"center",gap:10,marginTop:6}}>
                  <input type="range" min="1" max="12" step="0.5" value={personFormModal.data.horasDia||8} onChange={e=>setPersonFormModal(m=>({...m,data:{...m.data,horasDia:Number(e.target.value)}}))} style={{flex:1,accentColor:"#f59e0b"}}/>
                  <input type="number" min="1" max="12" step="0.5" value={personFormModal.data.horasDia||8} onChange={e=>setPersonFormModal(m=>({...m,data:{...m.data,horasDia:Number(e.target.value)}}))} style={{...S.inp,width:70,marginTop:0,padding:"5px 8px",textAlign:"center",fontWeight:700,color:"#f59e0b"}}/>
                  <span style={{fontSize:11,color:"#475569"}}>h/día</span>
                </div>
                <div style={{fontSize:10,color:"#475569",marginTop:4}}>Usado para calcular horas automáticamente al asignar por fechas</div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:24,justifyContent:"space-between",alignItems:"center"}}>
                {personFormModal.mode==="edit"?(
                  <button style={S.btn("danger")} onClick={()=>{if(window.confirm("¿Eliminar a "+personFormModal.data.name+"?")){update({people:people.filter(p=>p.id!==personFormModal.data.id),assignments:assignments.filter(a=>a.personId!==personFormModal.data.id)});if(selPerson&&selPerson.id===personFormModal.data.id)setSelPerson(null);setPersonFormModal(null);showToast("Eliminada");}}}>Eliminar</button>
                ):<div/>}
                <div style={{display:"flex",gap:8}}>
                  <button style={S.btn("default")} onClick={()=>setPersonFormModal(null)}>Cancelar</button>
                  <button style={S.btn("primary")} onClick={savePersonForm}>{personFormModal.mode==="new"?"Añadir persona":"Guardar cambios"}</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* MODAL IMPORTAR / EXPORTAR DATOS */}
        {showDataModal && (
          <div style={S.mover} onClick={()=>setShowDataModal(false)}>
            <div style={{...S.mbox,maxWidth:700,width:"96vw"}} onClick={e=>e.stopPropagation()}>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
                <div>
                  <div style={{fontSize:17,fontWeight:700,color:"#f1f5f9"}}>⬆️⬇️ Importar / Exportar datos</div>
                  <div style={{fontSize:12,color:"#64748b",marginTop:3}}>Copia de seguridad · JSON · Excel</div>
                </div>
                <button onClick={()=>setShowDataModal(false)} style={S.btn("ghost")}>✕</button>
              </div>

              {/* EXPORTAR */}
              <div style={{background:"#0f172a",borderRadius:10,padding:16,marginBottom:16,border:"1px solid #1e3a5f"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#3b82f6",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>📤 Exportar datos actuales</div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>Descarga un JSON con todos los proyectos, personas y asignaciones. Úsalo como copia de seguridad o para importar en otro equipo.</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button style={S.btn("primary")} onClick={()=>{
                    const d={projects,people,assignments,absences,_v:"cbs_bim_2026_v2",_exp:new Date().toISOString()};
                    const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
                    const url=URL.createObjectURL(blob);
                    const a=document.createElement("a"); a.href=url;
                    a.download="CBS_BIM_datos_"+new Date().toISOString().slice(0,10)+".json"; a.click();
                    URL.revokeObjectURL(url); showToast("Datos exportados ✓");
                  }}>⬇️ Descargar JSON</button>
                  <button style={S.btn("outline")} onClick={()=>{
                    const d={projects,people,assignments,absences};
                    navigator.clipboard.writeText(JSON.stringify(d,null,2))
                      .then(()=>showToast("JSON copiado ✓")).catch(()=>showToast("No se pudo copiar"));
                  }}>📋 Copiar JSON</button>
                  <button style={S.btn("outline")} onClick={()=>{
                    /* Descargar plantilla Excel vacía con instrucciones */
                    const lines = [
                      "=== HOJA: projects ===",
                      "id\tname\tclient\tstatus\thorasOferta\thorasConsumidas\ttipo\tinicio\tfin\tentrega",
                      "OT_EJEMPLO\tNombre proyecto\tCliente S.A.\tactivo\t400\t0\tOT\t2026-01-01\t2026-06-30\t2026-06-15",
                      "",
                      "=== HOJA: people ===",
                      "id\tname\tsoftware\tstatus\thorasDia",
                      "p01\tNombre Apellido\tRevit\tactivo\t8",
                      "",
                      "=== HOJA: assignments ===",
                      "personId\tprojectId\thoras\thorasReales\trol\tsoftware\tfechaIni\tfechaFin\tpct",
                      "p01\tOT_EJEMPLO\t200\t0\tModelado\tRevit\t2026-01-15\t2026-04-30\t50"
                    ].join("\n");
                    const blob=new Blob([lines],{type:"text/plain"});
                    const url=URL.createObjectURL(blob);
                    const a=document.createElement("a"); a.href=url;
                    a.download="CBS_BIM_plantilla.txt"; a.click();
                    URL.revokeObjectURL(url); showToast("Plantilla descargada ✓");
                  }}>📄 Plantilla Excel (TXT)</button>
                </div>
              </div>

              {/* IMPORTAR */}
              <div style={{background:"#0f172a",borderRadius:10,padding:16,border:"1px solid #334155"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#f59e0b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>📥 Importar datos</div>
                <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>
                  Acepta <strong style={{color:"#e2e8f0"}}>.json</strong> (exportado desde esta app) o <strong style={{color:"#e2e8f0"}}>.xlsx / .xls</strong> con 3 hojas: <code style={{color:"#a78bfa"}}>projects</code> · <code style={{color:"#a78bfa"}}>people</code> · <code style={{color:"#a78bfa"}}>assignments</code>.
                  {" "}<span style={{color:"#ef4444"}}>⚠️ Reemplaza todos los datos actuales.</span>
                </div>

                {/* Botones de subida */}
                <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                  <label style={{...S.btn("outline"),display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                    📁 Subir JSON
                    <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                      const file=e.target.files[0]; if(!file) return;
                      const reader=new FileReader();
                      reader.onload=ev=>{setImportText(ev.target.result);setImportError("");};
                      reader.readAsText(file); e.target.value="";
                    }}/>
                  </label>
                  <label style={{...S.btn("outline"),display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",borderColor:"#22c55e",color:"#22c55e"}}>
                    📊 Subir Excel (.xlsx)
                    <input type="file" accept=".xlsx,.xls" style={{display:"none"}} onChange={e=>{
                      var file=e.target.files[0]; if(!file) return;
                      setImportError("Leyendo Excel…");
                      var reader=new FileReader();
                      reader.onload=function(ev){
                        try {
                          var result=parsearExcel(ev.target.result);
                          setImportText(JSON.stringify(result,null,2));
                          setImportError("");
                          showToast("Excel leído: "+result.projects.length+" proy · "+result.people.length+" personas · "+result.assignments.length+" asig");
                        } catch(err) {
                          setImportError("Error leyendo Excel: "+err.message);
                        }
                      };
                      reader.readAsArrayBuffer(file); e.target.value="";
                    }}/>
                  </label>
                </div>

                {/* Preview / textarea */}
                <textarea
                  placeholder={'Pega JSON aquí, o sube un archivo arriba…\n\n{"projects":[…],"people":[…],"assignments":[…]}'}
                  value={importText}
                  onChange={e=>{setImportText(e.target.value);setImportError("");}}
                  style={{width:"100%",minHeight:130,background:"#020617",border:"1px solid #334155",borderRadius:8,padding:10,color:"#94a3b8",fontSize:11,fontFamily:"monospace",resize:"vertical",boxSizing:"border-box",marginBottom:8,outline:"none"}}
                />

                {importError && (
                  <div style={{color:"#f87171",fontSize:12,marginBottom:10,background:"#450a0a",border:"1px solid #7f1d1d",borderRadius:6,padding:"6px 10px"}}>
                    ⚠️ {importError}
                  </div>
                )}

                {/* Explicación modos */}
                <div style={{background:"#0a0f1a",border:"1px solid #1e293b",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:11,color:"#64748b",lineHeight:1.7}}>
                  <span style={{color:"#4ade80",fontWeight:700}}>🔀 Actualizar (merge):</span> añade lo nuevo, actualiza lo existente por ID, <strong style={{color:"#f1f5f9"}}>nunca borra</strong> lo que ya tienes.{"  ·  "}
                  <span style={{color:"#f87171",fontWeight:700}}>💣 Reemplazar:</span> borra todo y carga solo lo del archivo. Úsalo solo si sabes lo que haces.
                </div>

                <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"center",flexWrap:"wrap"}}>
                  <button style={S.btn("ghost")} onClick={()=>{setImportText("");setImportError("");}}>🗑️ Limpiar</button>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

                    {/* MERGE */}
                    <button style={{...S.btn("primary"),background:"#166534",borderColor:"#166534"}} onClick={()=>{
                      if(!importText.trim()){setImportError("El campo está vacío");return;}
                      var parsed;
                      try{parsed=JSON.parse(importText);}catch(e){setImportError("JSON inválido: "+e.message);return;}
                      var np=parsed.projects, npe=parsed.people, na=parsed.assignments, nab=parsed.absences;
                      // Merge projects by id
                      var mergedP = projects.slice();
                      if(Array.isArray(np)) np.forEach(function(item){
                        var idx=mergedP.findIndex(function(x){return x.id===item.id;});
                        if(idx>=0) mergedP[idx]=Object.assign({},mergedP[idx],item);
                        else mergedP.push(item);
                      });
                      // Merge people by id
                      var mergedPe = people.slice();
                      if(Array.isArray(npe)) npe.forEach(function(item){
                        var idx=mergedPe.findIndex(function(x){return x.id===item.id;});
                        if(idx>=0) mergedPe[idx]=Object.assign({},mergedPe[idx],item);
                        else mergedPe.push(item);
                      });
                      // Merge assignments by personId+projectId+rol
                      var mergedA = assignments.slice();
                      if(Array.isArray(na)) na.forEach(function(item){
                        var idx=mergedA.findIndex(function(x){return x.personId===item.personId&&x.projectId===item.projectId&&x.rol===item.rol;});
                        if(idx>=0) mergedA[idx]=Object.assign({},mergedA[idx],item);
                        else mergedA.push(item);
                      });
                      // Merge absences by id
                      var mergedAb = absences.slice();
                      if(Array.isArray(nab)) nab.forEach(function(item){
                        var idx=mergedAb.findIndex(function(x){return x.id===item.id;});
                        if(idx>=0) mergedAb[idx]=Object.assign({},mergedAb[idx],item);
                        else mergedAb.push(item);
                      });
                      update({projects:mergedP,people:mergedPe,assignments:mergedA,absences:mergedAb});
                      setShowDataModal(false); setImportText(""); setImportError("");
                      var added=(Array.isArray(np)?np.length:0)+(Array.isArray(npe)?npe.length:0)+(Array.isArray(na)?na.length:0);
                      showToast("Merge ✓ — "+added+" registros procesados, nada borrado");
                    }}>🔀 Actualizar (merge)</button>

                    {/* REPLACE ALL */}
                    <button style={S.btn("danger")} onClick={()=>{
                      if(!importText.trim()){setImportError("El campo está vacío");return;}
                      var parsed;
                      try{parsed=JSON.parse(importText);}catch(e){setImportError("JSON inválido: "+e.message);return;}
                      var p=parsed.projects, pe=parsed.people, a=parsed.assignments, ab=parsed.absences;
                      if(!Array.isArray(p)||!Array.isArray(pe)||!Array.isArray(a)){
                        setImportError("Faltan campos: projects, people o assignments");return;
                      }
                      if(!window.confirm("💣 ¿Reemplazar TODOS los datos? Esto borrará todo lo actual. No se puede deshacer.")) return;
                      update({projects:p,people:pe,assignments:a,absences:Array.isArray(ab)?ab:[]});
                      setShowDataModal(false); setImportText(""); setImportError("");
                      showToast("Reemplazado ✓ — "+p.length+" proy · "+pe.length+" pers · "+a.length+" asig");
                    }}>💣 Reemplazar todo</button>

                  </div>
                </div>

                {/* Columnas esperadas */}
                <details style={{marginTop:14}}>
                  <summary style={{fontSize:11,color:"#475569",cursor:"pointer",userSelect:"none"}}>📖 Ver columnas esperadas en Excel</summary>
                  <div style={{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    {[
                      {hoja:"projects",cols:"id · name · client · status · horasOferta · horasConsumidas · tipo · inicio · fin · entrega"},
                      {hoja:"people",cols:"id · name · software · status · horasDia"},
                      {hoja:"assignments",cols:"personId · projectId · horas · horasReales · rol · software · fechaIni · fechaFin · pct"},
                      {hoja:"absences (opcional)",cols:"id · personId · tipo · inicio · fin"},
                    ].map(x=>(
                      <div key={x.hoja} style={{background:"#020617",borderRadius:6,padding:10,border:"1px solid #1e293b"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",marginBottom:4}}>📋 {x.hoja}</div>
                        <div style={{fontSize:10,color:"#475569",lineHeight:1.6}}>{x.cols}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:10,color:"#334155",marginTop:8}}>
                    Las fechas pueden ser formato ISO (2026-01-15), dd/mm/yyyy, o número serial de Excel. Los nombres de columna son flexibles (acepta también: nombre, fecha_inicio, horas_dia, etc.)
                  </div>
                </details>
              </div>

            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
